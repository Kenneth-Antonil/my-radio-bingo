<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="monetag" content="0a72f0338630334d0fae4034849925ba">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0c12">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>RB Live | Under Maintenance</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/4nljOtR.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/4nljOtR.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Sora:wght@600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0a0c12;
            --surface: rgba(22, 26, 38, 0.85);
            --border: rgba(255, 255, 255, 0.07);
            --accent: #3b82f6;
            --accent-glow: #60a5fa;
            --text: #f1f5f9;
            --text-muted: rgba(241, 245, 249, 0.45);
            --gold: #f59e0b;
        }

        html, body {
            height: 100%;
            width: 100%;
        }

        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* === BACKGROUND AMBIENT GLOW === */
        .bg-glow {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-glow::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse-glow 6s ease-in-out infinite;
        }

        .bg-glow::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(245, 158, 11, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse-glow 8s ease-in-out infinite reverse;
        }

        /* === GRID OVERLAY === */
        .bg-grid {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.03;
            background-image:
                linear-gradient(rgba(255,255,255,0.5) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.5) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        /* === FLOATING PARTICLES === */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            animation: float-up linear infinite;
            opacity: 0;
        }

        /* === CARD === */
        .card {
            position: relative;
            z-index: 10;
            background: rgba(16, 20, 32, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 52px 44px 44px;
            max-width: 440px;
            width: calc(100% - 32px);
            text-align: center;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow:
                0 0 0 1px rgba(59, 130, 246, 0.06),
                0 32px 64px rgba(0, 0, 0, 0.6),
                0 0 80px rgba(59, 130, 246, 0.04);
            animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        /* === LOGO === */
        .logo-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 36px;
        }

        .logo-img {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            object-fit: cover;
        }

        .logo-text {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            color: var(--text);
        }

        .logo-text span {
            color: var(--accent);
        }

        /* === ICON === */
        .icon-wrap {
            width: 72px;
            height: 72px;
            margin: 0 auto 28px;
            border-radius: 20px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: icon-pulse 3s ease-in-out infinite;
        }

        .icon-wrap svg {
            width: 32px;
            height: 32px;
            stroke: #60a5fa;
            stroke-width: 1.5;
            fill: none;
        }

        /* === BADGE === */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.25);
            border-radius: 50px;
            padding: 5px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #fbbf24;
            margin-bottom: 20px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #f59e0b;
            animation: blink 1.5s ease-in-out infinite;
        }

        /* === HEADLINE === */
        h1 {
            font-family: 'Sora', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--text);
            line-height: 1.2;
            margin-bottom: 14px;
        }

        /* === SUBTEXT === */
        .subtext {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        /* === DIVIDER === */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
            margin-bottom: 28px;
        }

        /* === STATUS ROW === */
        .status-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            box-shadow: 0 0 8px #10b981;
            animation: blink 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        /* === ANIMATIONS === */
        @keyframes card-in {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse-glow {
            0%, 100% { opacity: 1; transform: translateX(-50%) scale(1); }
            50% { opacity: 0.6; transform: translateX(-50%) scale(1.1); }
        }

        @keyframes icon-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,0); }
            50% { box-shadow: 0 0 0 8px rgba(59,130,246,0.08); }
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        /* === MOBILE === */
        @media (max-width: 480px) {
            .card {
                padding: 40px 28px 36px;
                border-radius: 20px;
            }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>
    <div class="bg-grid"></div>
    <div class="particles" id="particles"></div>

    <div class="card">
        <!-- Logo -->
        <div class="logo-wrap">
            <img class="logo-img" src="https://i.imgur.com/4nljOtR.png" alt="RB Live Logo" onerror="this.style.display='none'">
            <div class="logo-text">RB <span>Live</span></div>
        </div>

        <!-- Maintenance Icon -->
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
            </svg>
        </div>

        <!-- Badge -->
        <div class="badge">
            <div class="badge-dot"></div>
            Under Maintenance
        </div>

        <!-- Headline -->
        <h1>We'll be right back</h1>

        <!-- Subtext -->
        <p class="subtext">
            RB Live is currently undergoing scheduled maintenance.<br>
            We'll be back <strong style="color: var(--text); font-weight: 700;">until further notice</strong> — thanks for your patience!
        </p>

        <div class="divider"></div>

        <!-- Status -->
        <div class="status-row">
            <div class="status-dot"></div>
            <span>Our team is actively working on improvements</span>
        </div>
    </div>

    <script>
        // Generate floating particles
        const container = document.getElementById('particles');
        const colors = ['rgba(59,130,246,0.4)', 'rgba(96,165,250,0.3)', 'rgba(245,158,11,0.25)', 'rgba(16,185,129,0.2)'];

        for (let i = 0; i < 18; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            const size = Math.random() * 3 + 1.5;
            p.style.cssText = `
                width: ${size}px;
                height: ${size}px;
                left: ${Math.random() * 100}%;
                background: ${colors[Math.floor(Math.random() * colors.length)]};
                animation-duration: ${Math.random() * 12 + 10}s;
                animation-delay: ${Math.random() * -15}s;
                border-radius: 50%;
            `;
            container.appendChild(p);
        }
    </script>
</body>
</html>
