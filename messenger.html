<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual">
    <meta name="theme-color" content="#17212b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Messages | Radio Bingo Live</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/7D8u8h6.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/7D8u8h6.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<style>
:root {
    --tg-bg: #17212b;
    --tg-nav: #232e3c;
    --tg-item-hover: #2b3a4a;
    --tg-msg-in: #182533;
    --tg-msg-out: #2b5278;
    --tg-accent: #5ca3e5;
    --tg-accent2: #3d8bd4;
    --tg-text: #ffffff;
    --tg-subtext: #708499;
    --tg-border: rgba(255,255,255,0.06);
    --tg-green: #4dcd5e;
    --tg-red: #e05252;
    --tg-input-bg: #242f3d;
    --radius-bubble: 18px;
    --safe-top: max(env(safe-area-inset-top), 12px);
    --safe-bottom: max(env(safe-area-inset-bottom), 10px);
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; margin: 0; padding: 0; }
html, body { height: 100%; height: 100dvh; background: var(--tg-bg); font-family: 'DM Sans', sans-serif; color: var(--tg-text); overflow: hidden; }

/* ══ LAYOUT ══ */
#messengerApp { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--tg-bg); overflow: hidden; }
.view { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
.view.active { display: flex; }

/* ══ AUTH GATE ══ */
#authGate { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 16px; padding: 32px; text-align: center; }
.auth-icon { width: 80px; height: 80px; background: var(--tg-accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }
.auth-title { font-size: 22px; font-weight: 800; }
.auth-sub { font-size: 14px; color: var(--tg-subtext); }
.auth-btn { padding: 14px 32px; background: var(--tg-accent); border: none; border-radius: 12px; color: white; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; }

/* ══ NAV HEADER ══ */
.tg-header {
    flex-shrink: 0;
    background: var(--tg-nav);
    display: flex; align-items: center; gap: 10px;
    padding: var(--safe-top) 14px 12px;
    min-height: 56px;
    border-bottom: 1px solid var(--tg-border);
}
.tg-header-title { font-size: 19px; font-weight: 800; flex: 1; letter-spacing: -0.3px; }
.tg-hbtn {
    width: 38px; height: 38px; border-radius: 50%;
    background: none; border: none; color: var(--tg-subtext);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: background 0.15s, color 0.15s;
}
.tg-hbtn:active { background: rgba(255,255,255,0.08); color: white; }
.tg-hbtn.accent { color: var(--tg-accent); }
.tg-hbtn.danger { color: var(--tg-red); }

/* Chat header specific */
.chat-header-avatar { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; flex-shrink: 0; position: relative; }
.chat-header-avatar img { width: 100%; height: 100%; object-fit: cover; }
.chat-header-info { flex: 1; min-width: 0; }
.chat-header-name { font-size: 16px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chat-header-status { font-size: 12px; color: var(--tg-subtext); }
.chat-header-status.online { color: var(--tg-green); }

/* ══ SEARCH BAR ══ */
.tg-search-wrap { padding: 8px 12px; background: var(--tg-nav); }
.tg-search-inner { position: relative; }
.tg-search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--tg-subtext); pointer-events: none; }
.tg-search-input {
    width: 100%; background: var(--tg-input-bg);
    border: 1px solid var(--tg-border); border-radius: 22px;
    padding: 10px 16px 10px 38px;
    color: white; font-size: 14px; outline: none;
    font-family: inherit;
}
.tg-search-input::placeholder { color: var(--tg-subtext); }

/* ══ STORIES / ACTIVE BAR ══ */
.tg-stories-bar {
    display: flex; gap: 0;
    padding: 10px 10px 8px;
    overflow-x: auto; scrollbar-width: none;
    background: var(--tg-nav);
    border-bottom: 1px solid var(--tg-border);
}
.tg-stories-bar::-webkit-scrollbar { display: none; }
.tg-story-item { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; flex-shrink: 0; padding: 0 7px; transition: transform 0.15s; }
.tg-story-item:active { transform: scale(0.92); }
.tg-story-ring { width: 54px; height: 54px; border-radius: 50%; border: 2.5px solid var(--tg-green); padding: 2px; position: relative; background: var(--tg-nav); }
.tg-story-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
.tg-story-dot { position: absolute; bottom: 1px; right: 1px; width: 13px; height: 13px; background: var(--tg-green); border: 2.5px solid var(--tg-nav); border-radius: 50%; }
.tg-story-name { font-size: 10px; color: var(--tg-subtext); font-weight: 600; max-width: 56px; text-align: center; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tg-stories-label { font-size: 11px; color: var(--tg-subtext); font-weight: 700; align-self: center; white-space: nowrap; flex-shrink: 0; padding: 0 6px; text-transform: uppercase; letter-spacing: 0.5px; }

/* ══ INBOX LIST ══ */
.tg-inbox-list { flex: 1; overflow-y: auto; background: var(--tg-bg); -webkit-overflow-scrolling: touch; }
.tg-inbox-list::-webkit-scrollbar { display: none; }

.tg-chat-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px; cursor: pointer;
    transition: background 0.12s;
    border-bottom: 1px solid var(--tg-border);
    position: relative;
}
.tg-chat-item:active { background: var(--tg-item-hover); }

.tg-avatar-wrap { position: relative; flex-shrink: 0; }
.tg-avatar { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; display: block; }
.tg-online-dot { position: absolute; bottom: 2px; right: 2px; width: 14px; height: 14px; background: var(--tg-green); border: 2.5px solid var(--tg-bg); border-radius: 50%; display: none; }
.tg-online-dot.on { display: block; }

.tg-chat-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px; }
.tg-chat-top { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.tg-chat-name { font-size: 15px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tg-chat-time { font-size: 11px; color: var(--tg-subtext); white-space: nowrap; flex-shrink: 0; }
.tg-chat-bottom { display: flex; align-items: center; gap: 4px; }
.tg-chat-preview { font-size: 13px; color: var(--tg-subtext); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
.tg-unread-badge { background: var(--tg-accent); color: white; border-radius: 12px; padding: 2px 7px; font-size: 11px; font-weight: 700; min-width: 22px; text-align: center; flex-shrink: 0; }
.tg-unread-badge.muted { background: var(--tg-subtext); }

.tg-verified { width: 16px; height: 16px; background: var(--tg-accent); border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; flex-shrink: 0; }

/* Skeleton */
.tg-skeleton { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid var(--tg-border); }
.skel-av { width: 54px; height: 54px; border-radius: 50%; flex-shrink: 0; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
.skel-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
.skel-line { height: 11px; border-radius: 6px; background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
.skel-line:first-child { width: 50%; }
.skel-line:last-child { width: 75%; }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ══ MESSAGE AREA ══ */
.tg-msg-area {
    flex: 1; min-height: 0;
    overflow-y: auto; padding: 8px 8px 6px;
    display: flex; flex-direction: column; gap: 2px;
    background: var(--tg-bg);
    -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
    background-image: 
        radial-gradient(ellipse at 20% 50%, rgba(92,163,229,0.03) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 20%, rgba(77,205,94,0.02) 0%, transparent 50%);
}
.tg-msg-area::-webkit-scrollbar { width: 3px; }
.tg-msg-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

/* Day divider */
.day-divider { text-align: center; font-size: 12px; color: var(--tg-subtext); font-weight: 600; margin: 10px 0 6px; display: flex; align-items: center; gap: 10px; }
.day-divider::before, .day-divider::after { content: ''; flex: 1; height: 1px; background: var(--tg-border); }

/* Bubbles - Telegram style with tails */
.msg-wrap { display: flex; flex-direction: column; max-width: 78%; margin-bottom: 2px; position: relative; }
.msg-wrap.me { align-self: flex-end; align-items: flex-end; }
.msg-wrap.them { align-self: flex-start; align-items: flex-start; }

.msg-bubble {
    padding: 8px 12px 6px;
    font-size: 14.5px; line-height: 1.45;
    word-break: break-word; position: relative;
    border-radius: var(--radius-bubble);
}
.msg-wrap.me .msg-bubble {
    background: var(--tg-msg-out);
    border-bottom-right-radius: 4px;
    color: white;
}
.msg-wrap.them .msg-bubble {
    background: var(--tg-msg-in);
    border-bottom-left-radius: 4px;
    color: white;
}
/* Tails */
.msg-wrap.me .msg-bubble::after {
    content: '';
    position: absolute; bottom: 0; right: -6px;
    width: 0; height: 0;
    border-left: 6px solid var(--tg-msg-out);
    border-bottom: 6px solid transparent;
    border-top: 0; border-right: 0;
}
.msg-wrap.them .msg-bubble::before {
    content: '';
    position: absolute; bottom: 0; left: -6px;
    width: 0; height: 0;
    border-right: 6px solid var(--tg-msg-in);
    border-bottom: 6px solid transparent;
    border-top: 0; border-left: 0;
}
/* When consecutive messages from same sender - no tail */
.msg-wrap.me.no-tail .msg-bubble { border-bottom-right-radius: var(--radius-bubble); }
.msg-wrap.me.no-tail .msg-bubble::after { display: none; }
.msg-wrap.them.no-tail .msg-bubble { border-bottom-left-radius: var(--radius-bubble); }
.msg-wrap.them.no-tail .msg-bubble::before { display: none; }

.msg-bubble.sticker { background: transparent !important; padding: 4px 0; font-size: 52px; line-height: 1; }
.msg-bubble.sticker::after, .msg-bubble.sticker::before { display: none !important; }

.msg-img { max-width: 220px; border-radius: 12px; margin-top: 4px; cursor: pointer; display: block; }
.msg-audio { max-width: 220px; height: 36px; border-radius: 20px; margin-top: 4px; outline: none; }

.msg-meta { display: flex; align-items: center; gap: 4px; justify-content: flex-end; margin-top: 3px; }
.msg-time-txt { font-size: 10px; color: rgba(255,255,255,0.45); }
.msg-tick { display: none; }
.msg-wrap.me .msg-tick { display: flex; }

.msg-reply-quote {
    border-left: 3px solid var(--tg-accent); padding: 4px 8px;
    margin-bottom: 5px; border-radius: 0 6px 6px 0;
    background: rgba(255,255,255,0.08); cursor: pointer;
}
.msg-reply-sender { font-size: 10px; font-weight: 700; color: var(--tg-accent); }
.msg-reply-preview { font-size: 12px; color: rgba(255,255,255,0.55); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px; }

.msg-sender-name { font-size: 11px; font-weight: 700; color: var(--tg-accent); margin-bottom: 2px; }

.msg-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; }
.reaction-chip {
    background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 2px 7px; font-size: 13px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 3px;
    animation: popIn 0.2s ease;
}
.reaction-chip:active { background: rgba(255,255,255,0.18); }
.reaction-count { font-size: 11px; color: rgba(255,255,255,0.7); }

/* Typing */
.typing-bubble { display: none; align-self: flex-start; background: var(--tg-msg-in); border-radius: var(--radius-bubble); border-bottom-left-radius: 4px; padding: 10px 16px; gap: 5px; align-items: center; margin-bottom: 4px; }
.typing-bubble.on { display: flex; }
.td { width: 7px; height: 7px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: tbounce 1.2s ease-in-out infinite; }
.td:nth-child(2) { animation-delay:.2s; }
.td:nth-child(3) { animation-delay:.4s; }
@keyframes tbounce { 0%,80%,100%{transform:translateY(0)} 40%{transform:translateY(-6px)} }

/* Swipe to reply indicator */
.swipe-reply-indicator { position: absolute; left: -40px; top: 50%; transform: translateY(-50%); width: 30px; height: 30px; background: var(--tg-accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.2s; pointer-events: none; }

/* ══ REPLY STRIP ══ */
#replyStrip {
    display: none; align-items: center; gap: 8px;
    padding: 7px 12px; background: var(--tg-nav);
    border-top: 1px solid var(--tg-border);
    border-left: 3px solid var(--tg-accent);
}
#replyStrip.on { display: flex; }
#replyStripName { font-size: 11px; font-weight: 700; color: var(--tg-accent); }
#replyStripText { font-size: 12px; color: var(--tg-subtext); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ══ IMAGE STRIP ══ */
#imgStrip { display: none; padding: 8px 12px 0; background: var(--tg-nav); align-items: center; gap: 8px; }
#imgStrip.on { display: flex; }
#imgStrip img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; border: 1.5px solid var(--tg-border); }

/* ══ EMOJI PANEL ══ */
.tg-panel {
    display: none; flex-wrap: wrap; gap: 4px;
    padding: 10px; background: var(--tg-nav);
    border-top: 1px solid var(--tg-border);
    max-height: 160px; overflow-y: auto;
}
.tg-panel.open { display: flex; }
.tg-emj { font-size: 28px; cursor: pointer; line-height: 1; padding: 4px; border-radius: 8px; transition: background 0.12s; }
.tg-emj:active { background: rgba(255,255,255,0.1); }
.tg-stk { font-size: 38px; cursor: pointer; line-height: 1; padding: 5px; border-radius: 10px; transition: transform 0.15s; }
.tg-stk:active { transform: scale(1.2); }

/* ══ CHAT SEARCH BAR ══ */
#chatSearchBar {
    display: none; align-items: center; gap: 6px;
    padding: 6px 10px; background: var(--tg-nav);
    border-bottom: 1px solid var(--tg-border);
}
#chatSearchBar.on { display: flex; }
#chatSearchInput {
    flex: 1; background: var(--tg-input-bg); border: 1px solid var(--tg-border);
    border-radius: 20px; padding: 7px 14px; color: white; font-size: 13px; outline: none; font-family: inherit;
}
#chatSearchCount { font-size: 12px; color: var(--tg-subtext); white-space: nowrap; }
.snav-btn { background: rgba(255,255,255,0.06); border: none; color: white; width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.msg-highlight { outline: 2px solid var(--tg-accent); border-radius: var(--radius-bubble); }

/* ══ FOOTER / INPUT BAR ══ */
.tg-footer {
    flex-shrink: 0;
    background: var(--tg-nav);
    border-top: 1px solid var(--tg-border);
    padding: 8px 10px var(--safe-bottom);
}
.tg-inputrow { display: flex; align-items: center; gap: 6px; width: 100%; }
.tg-input-field {
    flex: 1; min-width: 0;
    background: var(--tg-input-bg); border: 1px solid var(--tg-border);
    border-radius: 22px; padding: 10px 16px;
    color: white; font-size: 14.5px; outline: none;
    font-family: inherit; min-height: 44px; max-height: 120px;
    transition: border-color 0.2s; resize: none; overflow-y: auto;
}
.tg-input-field:focus { border-color: rgba(92,163,229,0.4); }
.tg-input-field::placeholder { color: var(--tg-subtext); }

.tg-ibtn {
    width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
    background: none; border: none; color: var(--tg-subtext);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.12s, color 0.15s;
}
.tg-ibtn:active { background: rgba(255,255,255,0.08); color: white; }
.tg-ibtn.active { color: var(--tg-accent); }
.tg-send-btn {
    width: 44px; height: 44px; border-radius: 50%; flex-shrink: 0;
    background: var(--tg-accent); border: none; color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 2px 12px rgba(92,163,229,0.4);
    transition: transform 0.1s, background 0.15s;
}
.tg-send-btn:active { transform: scale(0.9); background: var(--tg-accent2); }
.tg-voice-btn.recording {
    background: var(--tg-red) !important;
    color: white !important;
    animation: rPulse 1s infinite;
}
@keyframes rPulse { 0%,100%{box-shadow:0 0 0 0 rgba(224,82,82,0.5)} 50%{box-shadow:0 0 0 8px rgba(224,82,82,0)} }

/* Small screens */
@media (max-width: 360px) {
    .tg-ibtn { width: 34px; height: 34px; }
    .tg-send-btn { width: 38px; height: 38px; }
    .tg-inputrow { gap: 4px; }
    .tg-input-field { padding: 9px 12px; font-size: 13.5px; }
}

/* ══ CONTEXT MENU ══ */
#ctxOverlay { display: none; position: fixed; inset: 0; z-index: 9990; }
#ctxOverlay.on { display: block; }
#ctxMenu {
    display: none; position: fixed; z-index: 9995;
    background: #1c2b3a; border: 1px solid var(--tg-border);
    border-radius: 14px; padding: 6px; min-width: 180px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    backdrop-filter: blur(20px);
    animation: menuPop 0.15s cubic-bezier(0.175,0.885,0.32,1.275);
}
#ctxMenu.on { display: block; }
@keyframes menuPop { from{opacity:0;transform:scale(0.88)} to{opacity:1;transform:scale(1)} }
.ctx-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px; cursor: pointer;
    color: white; font-size: 14px; font-weight: 500;
    background: none; border: none; width: 100%; font-family: inherit;
    transition: background 0.1s;
}
.ctx-item:active { background: rgba(255,255,255,0.08); }
.ctx-item.red { color: var(--tg-red); }
.ctx-sep { height: 1px; background: var(--tg-border); margin: 4px 8px; }

/* ══ REACTION PICKER ══ */
#reactionPicker {
    display: none; position: fixed; z-index: 9996;
    background: #1c2b3a; border: 1px solid var(--tg-border);
    border-radius: 40px; padding: 8px 12px; gap: 6px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    animation: menuPop 0.15s ease;
}
#reactionPicker.on { display: flex; }
.rpick { font-size: 28px; background: none; border: none; cursor: pointer; padding: 2px; border-radius: 50%; transition: transform 0.1s; }
.rpick:active { transform: scale(1.35); }

/* ══ TOAST ══ */
#toast {
    position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: rgba(28,43,58,0.97); color: white;
    padding: 10px 20px; border-radius: 22px;
    font-size: 13px; font-weight: 600;
    opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 99999;
    white-space: nowrap; max-width: 90vw;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    border: 1px solid var(--tg-border);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ══ PHOTO VIEWER ══ */
#photoViewer {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.97); z-index: 99998;
    align-items: center; justify-content: center;
}
#photoViewer.show { display: flex; }
#photoViewer img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
.photo-close-btn {
    position: absolute; top: var(--safe-top); right: 16px;
    background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2);
    color: white; width: 40px; height: 40px; border-radius: 10px;
    font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    border: none; font-family: inherit;
}

/* ══ GROUP CREATE ══ */
.tg-group-view { background: var(--tg-bg); overflow-y: auto; padding: 16px; }
.tg-input-styled {
    width: 100%; background: var(--tg-input-bg);
    border: 1px solid var(--tg-border); border-radius: 12px;
    padding: 12px 16px; color: white; font-size: 15px; outline: none;
    font-family: inherit;
}
.tg-section-label { font-size: 11px; color: var(--tg-subtext); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 10px; }
.tg-friend-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 12px; border-radius: 12px; margin-bottom: 6px; cursor: pointer;
    background: var(--tg-item-hover); border: 1px solid var(--tg-border);
    transition: background 0.12s;
}
.tg-friend-item.selected { background: rgba(92,163,229,0.15); border-color: rgba(92,163,229,0.4); }
.tg-check-circle { width: 24px; height: 24px; border-radius: 50%; border: 2px solid var(--tg-subtext); display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.tg-friend-item.selected .tg-check-circle { background: var(--tg-accent); border-color: var(--tg-accent); }
.tg-create-btn { color: var(--tg-accent); background: none; border: none; font-weight: 800; font-size: 15px; cursor: pointer; font-family: inherit; }

/* ══ WEBRTC CALL SCREEN ══ */
#callScreen {
    display: none; position: fixed; inset: 0; z-index: 99997;
    background: #0f1923;
    flex-direction: column; align-items: center; justify-content: space-between;
    padding: var(--safe-top) 20px var(--safe-bottom);
}
#callScreen.on { display: flex; }
.call-bg-blur { position: absolute; inset: 0; z-index: 0; overflow: hidden; }
.call-bg-avatar { width: 120%; height: 120%; object-fit: cover; filter: blur(30px) brightness(0.3); margin: -10%; }
.call-content { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 40px; }
.call-avatar-ring { width: 120px; height: 120px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.2); padding: 4px; position: relative; }
.call-avatar-ring.calling { animation: callRing 1.5s ease-in-out infinite; }
@keyframes callRing {
    0%,100%{box-shadow:0 0 0 0 rgba(92,163,229,0.3)}
    50%{box-shadow:0 0 0 20px rgba(92,163,229,0)}
}
.call-avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; }
.call-name { font-size: 26px; font-weight: 800; color: white; }
.call-status { font-size: 15px; color: rgba(255,255,255,0.55); }
.call-timer { font-size: 18px; font-weight: 600; color: var(--tg-accent); font-variant-numeric: tabular-nums; display: none; }
.call-timer.on { display: block; }

/* Videos for video call */
#remoteVideo, #localVideo { display: none; border-radius: 14px; object-fit: cover; }
#remoteVideo.on { display: block; width: 100%; max-height: 50vh; }
#localVideo.on { display: block; position: fixed; bottom: 200px; right: 16px; width: 100px; height: 140px; border: 2px solid rgba(255,255,255,0.2); border-radius: 12px; z-index: 99999; }

.call-actions { position: relative; z-index: 1; display: flex; gap: 20px; align-items: center; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
.call-btn {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(255,255,255,0.12); border: none;
    color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;
    cursor: pointer; gap: 4px; transition: background 0.15s, transform 0.1s;
}
.call-btn:active { transform: scale(0.92); }
.call-btn.red { background: var(--tg-red); }
.call-btn.green { background: var(--tg-green); }
.call-btn.active { background: var(--tg-accent); }
.call-btn-label { font-size: 10px; color: rgba(255,255,255,0.6); font-weight: 600; }
.call-btn.red .call-btn-label { color: white; }
.call-btn.green .call-btn-label { color: white; }

/* Incoming call banner */
#incomingCallBanner {
    display: none; position: fixed; top: 0; left: 0; right: 0;
    background: var(--tg-nav); border-bottom: 1px solid var(--tg-border);
    padding: var(--safe-top) 14px 12px;
    z-index: 99990; flex-direction: column; gap: 10px;
}
#incomingCallBanner.on { display: flex; }
.incoming-call-info { display: flex; align-items: center; gap: 10px; }
.incoming-avatar { width: 46px; height: 46px; border-radius: 50%; object-fit: cover; }
.incoming-name { font-size: 15px; font-weight: 700; }
.incoming-sub { font-size: 12px; color: var(--tg-subtext); }
.incoming-btns { display: flex; gap: 10px; }
.incoming-btn {
    flex: 1; padding: 11px; border-radius: 12px;
    border: none; font-size: 14px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
}
.incoming-btn.decline { background: rgba(224,82,82,0.15); color: var(--tg-red); }
.incoming-btn.accept { background: rgba(77,205,94,0.15); color: var(--tg-green); }

/* FAB */
#fab {
    position: fixed; bottom: 80px; right: 18px;
    width: 52px; height: 52px; border-radius: 50%;
    background: var(--tg-accent); border: none; color: white;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; box-shadow: 0 4px 16px rgba(92,163,229,0.45);
    z-index: 100; transition: transform 0.2s;
}
#fab:active { transform: scale(0.9); }

/* Empty state */
.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 12px; color: var(--tg-subtext); font-size: 14px; font-weight: 500; }
.empty-icon { width: 70px; height: 70px; background: rgba(92,163,229,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 8px; }

@keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }

/* Seen indicator */
.msg-seen-label { font-size: 10px; color: var(--tg-subtext); text-align: right; padding-right: 4px; margin-top: 1px; }
</style>
</head>
<body>

<div id="messengerApp">

    <!-- AUTH GATE -->

        <div id="pmList" class="tg-inbox-list">

</div><!-- /messengerApp -->

    <button class="ctx-item" onclick="ctxAction('forward')">

        Forward
    </button>

function showToast(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);

function escapeHtml(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}
function fixDate(ts) {
    if (!ts) return '';
    const d = new Date(parseInt(ts));
    const now = new Date();
    if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
    return d.toLocaleDateString('en-PH',{month:'short',day:'numeric'});
}
function fixTime(ts) {
    if (!ts) return '';
    return new Date(parseInt(ts)).toLocaleTimeString('en-PH',{hour:'2-digit',minute:'2-digit'});
}
function formatLastSeen(ts) {
    if (!ts) return '';
    const diff = Date.now() - ts;
    const m = Math.floor(diff/60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
    if (m < 1) return 'just now';
    if (m < 60) return `${m}m ago`;
    if (h < 24) return `${h}h ago`;
    return `${d}d ago`;
}
function compressImage(file, maxW=800, q=0.75) {
    return new Promise(res => {
        const r = new FileReader();
        r.onload = e => {
            const img = new Image();
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const ratio = Math.min(1, maxW / img.width);
                canvas.width = img.width * ratio; canvas.height = img.height * ratio;
                canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
                res(canvas.toDataURL('image/jpeg',q));
            };
            img.src = e.target.result;
        };
        r.readAsDataURL(file);
    });
}

function loadInbox() {
    const uid = auth.currentUser.uid;
    const list = document.getElementById('pmList');
    list.innerHTML = `
        <div class="tg-skeleton"><div class="skel-av"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line"></div></div></div>
        <div class="tg-skeleton"><div class="skel-av"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line"></div></div></div>
        <div class="tg-skeleton"><div class="skel-av"></div><div class="skel-info"><div class="skel-line"></div><div class="skel-line"></div></div></div>
    `;
    const loadTimeout = setTimeout(() => {
        if (list.querySelector('.tg-skeleton')) {
            list.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div>No conversations yet</div><div style="font-size:12px;margin-top:4px;">Start chatting with a friend</div></div>`;
        }
    }, 8000);

    db.ref('groupMembers/' + uid).once('value', gSnap => {
        const myGroups = gSnap.exists() ? Object.keys(gSnap.val()) : [];
        const msgRef1 = db.ref('messages').orderByChild('from').equalTo(uid).limitToLast(150);
        const msgRef2 = db.ref('messages').orderByChild('to').equalTo(uid).limitToLast(150);
        const conversations = {};
        let done = 0;

        function processMsgs(s) {
            s.forEach(snap => {
                const m = snap.val();
                const partner = m.from === uid ? m.to : m.from;
                if (!partner) return;
                if (!conversations[partner] || m.timestamp > (conversations[partner].timestamp||0)) conversations[partner] = m;
            });
            done++;
            if (done === 2) afterLoaded();
        }
        msgRef1.once('value', processMsgs, ()=>{done++;if(done===2)afterLoaded();});
        msgRef2.once('value', processMsgs, ()=>{done++;if(done===2)afterLoaded();});

        function afterLoaded() {
            clearTimeout(loadTimeout);
            list.innerHTML = '';
            const partnerIds = Object.keys(conversations);

            myGroups.forEach(gid => {
                db.ref('groups/'+gid).once('value', gs => {
                    const g = gs.val(); if (!g) return;
                    const div = buildChatItem({
                        id: gid, name: g.name,
                        photo: null, isGroup: true,
                        preview: 'Group Chat', time: '',
                        isOnline: false
                    });
                    div.onclick = () => openGroupChat(gid, g.name);
                    list.insertBefore(div, list.firstChild);
                });
            });

            if (!partnerIds.length) {
                if (!myGroups.length) list.innerHTML = `<div class="empty-state"><div class="empty-icon"><svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg></div><div>No conversations yet</div></div>`;
                return;
            }

            const items = [];
            let processed = 0;
            partnerIds.forEach(pid => {
                db.ref('users/'+pid).once('value', us => {
                    const u = us.val() || {};
                    db.ref('status/'+pid).once('value', ss => {
                        const st = ss.val();
                        const isOnline = st && st.state === 'online';
                        const lastMsg = conversations[pid];
                        const preview = lastMsg.image ? 'Photo' : (lastMsg.text || '');
                        items.push({ pid, u, isOnline, lastMsg, preview, ts: lastMsg.timestamp||0 });
                        processed++;
                        if (processed === partnerIds.length) {
                            items.sort((a,b) => { if(a.isOnline&&!b.isOnline)return-1; if(!a.isOnline&&b.isOnline)return 1; return b.ts-a.ts; });
                            items.forEach(data => {
                                const isVerified = data.u.verified === true;
                                const fromMe = data.lastMsg.from === uid;
                                const div = buildChatItem({
                                    id: data.pid, name: data.u.name||'User',
                                    photo: data.u.photo, isGroup: false,
                                    preview: (fromMe?'You: ':'')+escapeHtml(data.preview),
                                    time: fixDate(data.ts), isOnline: data.isOnline,
                                    verified: isVerified
                                });
                                div.onclick = () => openPrivateChat(data.pid, data.u.name, data.u.photo||'');
                                list.appendChild(div);
                            });
                            addUnreadBadges();
                        }
                    });
                });
            });
        }
    });
}

function buildChatItem({id, name, photo, isGroup, preview, time, isOnline, verified}) {
    const div = document.createElement('div');
    div.className = 'tg-chat-item';
    const avatarHtml = isGroup
        ? `<div class="tg-avatar" style="background:var(--tg-input-bg);display:flex;align-items:center;justify-content:center;"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>`
        : `<img class="tg-avatar" src="${photo||'https://placehold.co/54x54/1c2b3a/ffffff?text=?'}" alt="" data-uid="${id}">`;
    const onlineDot = !isGroup && isOnline ? '<div class="tg-online-dot on"></div>' : '';
    const verBadge = verified ? `<span class="tg-verified"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span>` : '';
    div.innerHTML = `
        <div class="tg-avatar-wrap">${avatarHtml}${onlineDot}</div>
        <div class="tg-chat-info">
            <div class="tg-chat-top">
                <div class="tg-chat-name">${escapeHtml(name)}${verBadge}</div>
                <div class="tg-chat-time">${time}</div>
            </div>
            <div class="tg-chat-bottom">
                <div class="tg-chat-preview">${preview}</div>
            </div>
        </div>
    `;
    return div;
}

function addUnreadBadges() {
    if (!auth.currentUser) return;
    const myUid = auth.currentUser.uid;
    document.querySelectorAll('.tg-chat-item').forEach(item => {
        const img = item.querySelector('[data-uid]');
        if (!img) return;
        const partnerId = img.getAttribute('data-uid');
        if (!partnerId) return;
        db.ref('unread/'+myUid+'/'+partnerId).once('value', snap => {
            const count = snap.val() || 0;
            if (count > 0) {
                const bottom = item.querySelector('.tg-chat-bottom');
                if (bottom && !bottom.querySelector('.tg-unread-badge')) {
                    const badge = document.createElement('span');
                    badge.className = 'tg-unread-badge';
                    badge.textContent = count > 99 ? '99+' : count;
                    bottom.appendChild(badge);
                }
                const name = item.querySelector('.tg-chat-name');
                if (name) name.style.fontWeight = '800';
            }
        });
    });
}

function loadActiveFriends() {

                        bar.appendChild(item);
                    });

                    const existing = bar.querySelector(`[data-fid="${fid}"]`);

function openPrivateChat(uid, name, photo) {
    if (uid === auth.currentUser.uid) return showToast("Can't message yourself");
    currentChatPartner = uid;
    isGroupChat = false;
    document.getElementById('chatTargetName').textContent = name;

    // Set avatar in header
    document.getElementById('chatAvatarCont').innerHTML = `<img src="${photo||'https://placehold.co/38/1c2b3a/fff?text=?'}" style="width:38px;height:38px;border-radius:50%;object-fit:cover;">`;
    // Show call btns
    document.getElementById('voiceCallBtn').style.display = '';
    document.getElementById('videoCallBtn').style.display = '';

    db.ref('status/'+uid).on('value', ss => {
        const st = ss.val();
        const el = document.getElementById('chatTargetStatus');
        if (st && st.state === 'online') { el.textContent = 'online'; el.className = 'chat-header-status online'; }
        else if (st && st.last_seen) { el.textContent = `last seen ${formatLastSeen(st.last_seen)}`; el.className = 'chat-header-status'; }
        else { el.textContent = 'offline'; el.className = 'chat-header-status'; }
    });

    // Clear unread
    db.ref('unread/'+auth.currentUser.uid+'/'+uid).remove();
    db.ref('notifications/'+auth.currentUser.uid).once('value', s => {
        s.forEach(n => { if (n.val().type==='pm' && n.val().from===uid) db.ref('notifications/'+auth.currentUser.uid+'/'+n.key).remove(); });
    });

    listenPrivateMessages(auth.currentUser.uid);
    showView('pmChatView');

    db.ref('typing/'+auth.currentUser.uid+'/'+uid).on('value', snap => {
        document.getElementById('pmTypingIndicator').classList.toggle('on', snap.exists() && snap.val() === true);
    });
}

function listenGroupMessages(groupId) {
    const chatDiv = document.getElementById('pmMessages');
    chatDiv.innerHTML = '';
    if (pmListenerRef) pmListenerRef.off();
    const gRef = db.ref('groupMessages/'+groupId).limitToLast(100);
    gRef.on('child_added', s => {
        const m = s.val(); const key = s.key;
        const isMe = m.from === auth.currentUser.uid;
        appendMessage(m, key, isMe, true);
    });
    pmListenerRef = gRef;
}

// ═══════════════════════════════════════
// LISTEN PRIVATE MESSAGES
// ═══════════════════════════════════════
function listenPrivateMessages(myUid) {
    const chatDiv = document.getElementById('pmMessages');
    chatDiv.innerHTML = '';
    if (pmListenerRef) { pmListenerRef.off(); pmListenerRef = null; }
    isInitialLoad = true;
    _lastSentKey = null;

    pmListenerRef = db.ref('messages').limitToLast(100);
    pmListenerRef.on('child_added', s => {
        const m = s.val(); const key = s.key;
        if (!isInitialLoad && m.to === myUid && m.timestamp > Date.now()-2000) {
            db.ref('users/'+m.from).once('value', us => {
                const sender = us.val();
                if (sender && currentChatPartner !== m.from) {
                    const txt = m.isSticker?'(Sticker)':m.isVoice?'(Voice)':m.image?'(Photo)':(m.text||'');
                    showToast(`${escapeHtml(sender.name)}: ${escapeHtml(txt.substring(0,30))}`);
                }
            });
        }
        if (!currentChatPartner) return;
        if ((m.from===myUid&&m.to===currentChatPartner)||(m.from===currentChatPartner&&m.to===myUid)) {
            const isMe = m.from === myUid;
            appendMessage(m, key, isMe, false);
            if (!isMe && currentChatPartner) db.ref('unread/'+myUid+'/'+currentChatPartner).remove();
        }
    });

    // Listen for seen status
    pmListenerRef.on('child_changed', s => {
        const m = s.val(); const key = s.key;
        if ((m.from===myUid&&m.to===currentChatPartner)) {
            updateSeenBadge(_lastSentKey, m.seen);
        }
        // Update reactions
        if (m.reactions) {
            const wrap = document.querySelector(`[data-msgkey="${key}"]`);
            if (wrap) renderReactions(wrap.querySelector('.msg-reactions'), m.reactions);
        }
    });

    setTimeout(() => { isInitialLoad = false; }, 1500);
}

// ═══════════════════════════════════════
// APPEND MESSAGE
// ═══════════════════════════════════════
let _lastMsgFrom = null;

function appendMessage(m, key, isMe, isGroup) {
    const chatDiv = document.getElementById('pmMessages');
    const wrap = document.createElement('div');
    wrap.className = `msg-wrap ${isMe ? 'me' : 'them'}`;
    wrap.setAttribute('data-msgkey', key);

    // No-tail if consecutive from same person
    if (_lastMsgFrom === m.from) wrap.classList.add('no-tail');
    _lastMsgFrom = m.from;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';

    // Group sender name
    if (isGroup && !isMe) {
        const sn = document.createElement('div');
        sn.className = 'msg-sender-name';
        sn.textContent = m.senderName || 'User';
        bubble.appendChild(sn);
    }

    // Reply quote
    if (m.replyTo) {
        const rq = document.createElement('div');
        rq.className = 'msg-reply-quote';
        rq.onclick = () => scrollToMsg(m.replyTo.key);
        rq.innerHTML = `<div class="msg-reply-sender">${escapeHtml(m.replyTo.senderName||'User')}</div><div class="msg-reply-preview">${m.replyTo.image?'📷 Photo':escapeHtml(m.replyTo.text||'')}</div>`;
        bubble.appendChild(rq);
    }

    // Content
    if (m.isSticker) {
        bubble.classList.add('sticker');
        bubble.textContent = m.text || '';
    } else if (m.isVoice && m.audio) {
        const audio = document.createElement('audio');
        audio.controls = true; audio.src = m.audio;
        audio.className = 'msg-audio';
        bubble.appendChild(audio);
    } else {
        if (m.text) {
            const txt = document.createElement('span');
            txt.textContent = m.text;
            bubble.appendChild(txt);
        }
        if (m.image) {
            const img = document.createElement('img');
            img.src = m.image; img.className = 'msg-img';
            img.onclick = () => openFullscreenPhoto(m.image);
            bubble.appendChild(img);
        }
    }

    // Meta (time + tick)
    if (!m.isSticker) {
        const meta = document.createElement('div');
        meta.className = 'msg-meta';
        const timeTxt = document.createElement('span');
        timeTxt.className = 'msg-time-txt';
        timeTxt.textContent = fixTime(m.timestamp);
        meta.appendChild(timeTxt);
        if (isMe) {
            const tick = document.createElement('span');
            tick.className = 'msg-tick';
            tick.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="color:${m.seen?'var(--tg-accent)':'rgba(255,255,255,0.4)'}"><polyline points="20 6 9 17 4 12"/>${m.seen?'<polyline points="20 3 9 14 4 9" style="transform:translateX(3px)"/>':''}</svg>`;
            meta.appendChild(tick);
        }
        bubble.appendChild(meta);
    }

    // Long press context menu
    let pressTimer;
    bubble.addEventListener('touchstart', e => { pressTimer = setTimeout(() => openCtx(e, key, m, isMe), 500); });
    bubble.addEventListener('touchend', () => clearTimeout(pressTimer));
    bubble.addEventListener('touchmove', () => clearTimeout(pressTimer));
    bubble.addEventListener('contextmenu', e => { e.preventDefault(); openCtx(e, key, m, isMe); });
    bubble.addEventListener('dblclick', () => {
        if (!m.hearted) { db.ref('messages/'+key).update({ hearted:true }); }
    });

    wrap.appendChild(bubble);

    // Reactions
    const reactDiv = document.createElement('div');
    reactDiv.className = 'msg-reactions';
    if (m.reactions) renderReactions(reactDiv, m.reactions);
    wrap.appendChild(reactDiv);

    chatDiv.appendChild(wrap);
    chatDiv.scrollTop = chatDiv.scrollHeight;

    if (isMe) {
        _lastSentKey = key;
        // Mark as sent
        db.ref('messages/'+key).update({ sent: true });
    }
}

function renderReactions(container, reactions) {
    if (!container) return;
    container.innerHTML = '';
    const counts = {};
    Object.values(reactions).forEach(r => { counts[r] = (counts[r]||0)+1; });
    Object.entries(counts).forEach(([emoji, count]) => {
        const chip = document.createElement('span');
        chip.className = 'reaction-chip';
        chip.innerHTML = `${emoji} <span class="reaction-count">${count}</span>`;
        chip.onclick = () => sendReactionForKey(_ctxKey, emoji);
        container.appendChild(chip);
    });
}

function updateSeenBadge(key, seen) {
    if (!key) return;
    const wrap = document.querySelector(`[data-msgkey="${key}"]`);
    if (!wrap) return;
    const tick = wrap.querySelector('.msg-tick');
    if (tick) tick.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${seen?'var(--tg-accent)':'rgba(255,255,255,0.4)'}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
}

// ═══════════════════════════════════════
// SEND MESSAGE
// ═══════════════════════════════════════
function sendPrivateMessage() {
    const inp = document.getElementById('pmInput');
    const text = inp.value.trim();
    const imageData = pmImageBase64 || null;
    if ((!text && !imageData) || !currentChatPartner) return;
    const myUid = auth.currentUser.uid;

    if (isGroupChat) {
        const msgData = { from:myUid, senderName:userData.name||'User', text, image:imageData, timestamp:Date.now() };
        if (replyToMsg) msgData.replyTo = replyToMsg;
        db.ref('groupMessages/'+currentChatPartner).push(msgData);
    } else {
        const msgData = { from:myUid, to:currentChatPartner, text, image:imageData, timestamp:Date.now(), sent:false, seen:false };
        if (replyToMsg) msgData.replyTo = replyToMsg;
        db.ref('messages').push(msgData).then(ref => {
            _lastSentKey = ref.key;
            db.ref('unread/'+currentChatPartner+'/'+myUid).transaction(v => (v||0)+1);
            // Mark seen by recipient listener
            db.ref('seen/'+currentChatPartner+'/'+myUid).set(true);
        });
        const notifMsg = imageData ? 'Sent a photo' : `New PM from ${userData.name}`;
        db.ref('notifications/'+currentChatPartner).push({ msg:notifMsg, time:Date.now(), type:'pm', from:myUid, fromName:userData.name });
    }

    inp.value = '';
    pmImageBase64 = null;
    document.getElementById('pmImgInput').value = '';
    document.getElementById('imgStrip').classList.remove('on');
    cancelReply();
}

// ═══════════════════════════════════════
function deleteConversation() {
    if (!currentChatPartner) return;
    if (!confirm(isGroupChat?'Leave this group?':'Delete this conversation?')) return;
    const myUid = auth.currentUser.uid;
    if (isGroupChat) {
        db.ref('groups/'+currentChatPartner+'/members/'+myUid).remove();
        db.ref('groupMembers/'+myUid+'/'+currentChatPartner).remove();
        showToast('Left group');
    } else {
        db.ref('messages').once('value', s => {
            const updates = {};
            s.forEach(snap => { const m=snap.val(); if((m.from===myUid&&m.to===currentChatPartner)||(m.from===currentChatPartner&&m.to===myUid)) updates['messages/'+snap.key]=null; });
            db.ref().update(updates);
            showToast('Conversation deleted');
        });
    }
    backToInbox();
}

// ═══════════════════════════════════════
// VOICE RECORDING
// ═══════════════════════════════════════
function startVoice() {
    if (!navigator.mediaDevices||!window.MediaRecorder) return showToast('Voice not supported');
    navigator.mediaDevices.getUserMedia({audio:true}).then(stream => {
        _pmVoiceChunks = [];
        _pmVoiceRec = new MediaRecorder(stream);
        _pmVoiceRec.ondataavailable = e => _pmVoiceChunks.push(e.data);
        _pmVoiceRec.onstop = () => {
            const blob = new Blob(_pmVoiceChunks, {type:'audio/webm'});
            const reader = new FileReader();
            reader.onload = ev => {
                if (!currentChatPartner||!auth.currentUser) return;
                const myUid = auth.currentUser.uid;
                const msg = { from:myUid, audio:ev.target.result, isVoice:true, timestamp:Date.now() };
                if (isGroupChat) { msg.senderName=userData.name||'User'; db.ref('groupMessages/'+currentChatPartner).push(msg); }
                else { msg.to=currentChatPartner; db.ref('messages').push(msg); }
                showToast('Voice note sent');
            };
            reader.readAsDataURL(blob);
            stream.getTracks().forEach(t=>t.stop());
        };
        _pmVoiceRec.start();
        document.getElementById('pmVoiceBtn').classList.add('recording');
        showToast('Recording… release to send');
    }).catch(() => showToast('Microphone access denied'));
}
function stopVoice() {
    if (_pmVoiceRec && _pmVoiceRec.state==='recording') {
        _pmVoiceRec.stop();
        document.getElementById('pmVoiceBtn').classList.remove('recording');
    }
}

// CONTEXT MENU
// ═══════════════════════════════════════
function openCtx(e, key, msgData, isOwn) {
    _ctxKey = key; _ctxData = msgData; _ctxIsOwn = isOwn;
    document.getElementById('ctxDeleteBtn').style.display = isOwn ? '' : 'none';
    const menu = document.getElementById('ctxMenu');
    const overlay = document.getElementById('ctxOverlay');
    let x = 20, y = 100;
    if (e.touches && e.touches.length) { x=e.touches[0].clientX-10; y=e.touches[0].clientY-10; }
    else if (e.clientX) { x=e.clientX-10; y=e.clientY-10; }
    menu.style.left = Math.min(x, window.innerWidth-200)+'px';
    menu.style.top = Math.min(y, window.innerHeight-200)+'px';
    menu.classList.add('on'); overlay.classList.add('on');
}
function closeCtx() {
    document.getElementById('ctxMenu').classList.remove('on');
    document.getElementById('reactionPicker').classList.remove('on');
    document.getElementById('ctxOverlay').classList.remove('on');
}
function ctxAction(action) {
    closeCtx();
    if (action==='reply') {
        if (!_ctxData) return;
        replyToMsg = { key:_ctxKey, senderName:_ctxIsOwn?(userData.name||'You'):document.getElementById('chatTargetName').textContent, text:_ctxData.text, image:_ctxData.image };
        document.getElementById('replyStripName').textContent = replyToMsg.senderName;
        document.getElementById('replyStripText').textContent = replyToMsg.text || (_ctxData.image?'📷 Photo':'…');
        document.getElementById('replyStrip').classList.add('on');
        document.getElementById('pmInput').focus();
    } else if (action==='copy') {
        if (_ctxData&&_ctxData.text) navigator.clipboard&&navigator.clipboard.writeText(_ctxData.text).then(()=>showToast('Copied!'));
    } else if (action==='delete') {
        if (!_ctxIsOwn||!_ctxKey) return;
        if (confirm('Delete this message?')) { db.ref('messages/'+_ctxKey).remove(); showToast('Message deleted'); }
    } else if (action==='forward') {
        showToast('Forward: select a conversation');
    }
}
function openReactionPicker() {
    const menu = document.getElementById('ctxMenu');
    const picker = document.getElementById('reactionPicker');
    const rect = menu.getBoundingClientRect();
    picker.style.left = rect.left+'px';
    picker.style.top = (rect.top - 60)+'px';
    picker.classList.add('on');
}
function sendReaction(emoji) {
    closeCtx();
    if (!_ctxKey||!auth.currentUser) return;
    const path = isGroupChat
        ? 'groupMessages/'+currentChatPartner+'/'+_ctxKey+'/reactions/'+auth.currentUser.uid
        : 'messages/'+_ctxKey+'/reactions/'+auth.currentUser.uid;
    db.ref(path).set(emoji);
}
function sendReactionForKey(key, emoji) {
    if (!auth.currentUser) return;
    const path = isGroupChat
        ? 'groupMessages/'+currentChatPartner+'/'+key+'/reactions/'+auth.currentUser.uid
        : 'messages/'+key+'/reactions/'+auth.currentUser.uid;
    db.ref(path).set(emoji);
}

function closeChatSearch() {

    document.getElementById('chatSearchInput').value = '';
    document.querySelectorAll('.msg-highlight').forEach(el=>el.classList.remove('msg-highlight'));
    _searchMatches=[]; _searchIdx=-1;
}
function runSearch(q) {
    document.querySelectorAll('.msg-highlight').forEach(el=>el.classList.remove('msg-highlight'));
    _searchMatches=[]; _searchIdx=-1;
    const countEl = document.getElementById('chatSearchCount');
    if (!q.trim()) { countEl.textContent=''; return; }
    document.querySelectorAll('.msg-bubble').forEach(el => {
        if (el.textContent.toLowerCase().includes(q.toLowerCase())) _searchMatches.push(el);
    });
    countEl.textContent = _searchMatches.length ? '1/'+_searchMatches.length : 'No results';
    if (_searchMatches.length) { _searchIdx=0; highlightSearch(); }
}
function navSearch(dir) {
    if (!_searchMatches.length) return;
    _searchIdx = (_searchIdx+dir+_searchMatches.length)%_searchMatches.length;
    document.getElementById('chatSearchCount').textContent = (_searchIdx+1)+'/'+_searchMatches.length;
    highlightSearch();
}
function highlightSearch() {
    document.querySelectorAll('.msg-highlight').forEach(el=>el.classList.remove('msg-highlight'));
    if (_searchMatches[_searchIdx]) { _searchMatches[_searchIdx].classList.add('msg-highlight'); _searchMatches[_searchIdx].scrollIntoView({behavior:'smooth',block:'center'}); }
}
function scrollToMsg(key) {
    const el = document.querySelector(`[data-msgkey="${key}"]`);
    if (el) { el.scrollIntoView({behavior:'smooth',block:'center'}); el.classList.add('msg-highlight'); setTimeout(()=>el.classList.remove('msg-highlight'),1500); }
}

// ═══════════════════════════════════════
// ══════ WEBRTC CALLING ══════
// ═══════════════════════════════════════

function listenForIncomingCalls() {
    if (!auth.currentUser) return;
    const myUid = auth.currentUser.uid;
    if (callListener) db.ref('calls').off('child_added', callListener);
    callListener = db.ref('callRequests/'+myUid).on('child_added', snap => {
        const data = snap.val();
        if (!data || data.status !== 'ringing') return;
        incomingCallData = { ...data, callId: snap.key };
        showIncomingCallBanner(data);
        // Auto-decline after 30s
        setTimeout(() => { if (incomingCallData && incomingCallData.callId === snap.key) declineCall(); }, 30000);
    });
}

function showIncomingCallBanner(data) {
    document.getElementById('incomingCallName').textContent = data.callerName || 'Someone';
    document.getElementById('incomingCallAvatar').src = data.callerPhoto || 'https://placehold.co/46/1c2b3a/fff?text=?';
    document.getElementById('incomingCallType').textContent = data.type === 'video' ? 'Video Call' : 'Voice Call';
    document.getElementById('incomingCallBanner').classList.add('on');
}

async function startVoiceCall() {
    await initiateCall('voice');
}
async function startVideoCall() {
    await initiateCall('video');
}

async function initiateCall(type) {
    if (!currentChatPartner || isGroupChat || !auth.currentUser) return showToast('Cannot call in groups');
    callType = type;
    isCaller = true;
    const myUid = auth.currentUser.uid;
    const partnerName = document.getElementById('chatTargetName').textContent;
    const partnerPhoto = document.getElementById('chatAvatarCont').querySelector('img')?.src || '';

    // Get media
    try {
        const constraints = type === 'video' ? { audio:true, video:true } : { audio:true, video:false };
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) { return showToast('Microphone/camera access denied'); }

    // Generate call ID
    callId = myUid + '_' + currentChatPartner + '_' + Date.now();

    // Show call screen
    showCallScreen(partnerName, partnerPhoto, 'Calling…');

    // Create peer connection
    peerConnection = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

    peerConnection.ontrack = e => {
        remoteStream = e.streams[0];
        const remoteVideo = document.getElementById('remoteVideo');
        remoteVideo.srcObject = remoteStream;
    };

    // If video, show local
    if (type === 'video') {
        const localVideo = document.getElementById('localVideo');
        localVideo.srcObject = localStream;
        localVideo.classList.add('on');
    }

    // Store ICE candidates
    peerConnection.onicecandidate = e => {
        if (e.candidate) {
            db.ref('calls/'+callId+'/callerCandidates').push(e.candidate.toJSON());
        }
    };

    // Create offer
    const offer = await peerConnection.createOffer();
    await peerConnection.setLocalDescription(offer);
    await db.ref('calls/'+callId).set({ offer:{type:offer.type,sdp:offer.sdp}, status:'ringing', type:callType });

    // Notify recipient
    db.ref('callRequests/'+currentChatPartner+'/'+callId).set({
        callId, callerId:myUid, callerName:userData.name||'User', callerPhoto:userData.photo||'', type:callType, status:'ringing'
    });

    // Listen for answer
    db.ref('calls/'+callId+'/answer').on('value', async snap => {
        if (!snap.exists() || peerConnection.currentRemoteDescription) return;
        const answer = snap.val();
        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        document.getElementById('callStatus').textContent = 'Connected';
        document.getElementById('callAvatarRing').classList.remove('calling');
        startCallTimer();
        if (callType === 'video') document.getElementById('remoteVideo').classList.add('on');
    });

    // Listen for callee ICE
    db.ref('calls/'+callId+'/calleeCandidates').on('child_added', snap => {
        if (!peerConnection) return;
        peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())).catch(()=>{});
    });

    // Listen for hang up
    db.ref('calls/'+callId+'/status').on('value', snap => {
        if (snap.val() === 'ended') endCallCleanup();
    });
}

async function acceptCall() {
    document.getElementById('incomingCallBanner').classList.remove('on');
    if (!incomingCallData) return;
    callType = incomingCallData.type || 'voice';
    callId = incomingCallData.callId;
    isCaller = false;
    const callerName = incomingCallData.callerName || 'Caller';
    const callerPhoto = incomingCallData.callerPhoto || '';

    // Get media
    try {
        const constraints = callType === 'video' ? {audio:true, video:true} : {audio:true, video:false};
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
    } catch(e) { return showToast('Microphone/camera access denied'); }

    showCallScreen(callerName, callerPhoto, 'Connecting…');

    peerConnection = new RTCPeerConnection(ICE_SERVERS);
    localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

    if (callType === 'video') {
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('localVideo').classList.add('on');
    }

    peerConnection.ontrack = e => {
        remoteStream = e.streams[0];
        document.getElementById('remoteVideo').srcObject = remoteStream;
        if (callType === 'video') document.getElementById('remoteVideo').classList.add('on');
    };

    peerConnection.onicecandidate = e => {
        if (e.candidate) db.ref('calls/'+callId+'/calleeCandidates').push(e.candidate.toJSON());
    };

    // Get offer & set remote desc
    const offerSnap = await db.ref('calls/'+callId+'/offer').once('value');
    const offer = offerSnap.val();
    await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));

    // Create answer
    const answer = await peerConnection.createAnswer();
    await peerConnection.setLocalDescription(answer);
    await db.ref('calls/'+callId+'/answer').set({type:answer.type, sdp:answer.sdp});
    await db.ref('callRequests/'+auth.currentUser.uid+'/'+callId).update({status:'accepted'});

    // Get caller ICE
    db.ref('calls/'+callId+'/callerCandidates').on('child_added', snap => {
        if (!peerConnection) return;
        peerConnection.addIceCandidate(new RTCIceCandidate(snap.val())).catch(()=>{});
    });

    document.getElementById('callStatus').textContent = 'Connected';
    document.getElementById('callAvatarRing').classList.remove('calling');
    startCallTimer();

    db.ref('calls/'+callId+'/status').on('value', snap => {
        if (snap.val() === 'ended') endCallCleanup();
    });

    incomingCallData = null;
}

function declineCall() {
    document.getElementById('incomingCallBanner').classList.remove('on');
    if (incomingCallData) {
        db.ref('calls/'+incomingCallData.callId+'/status').set('ended');
        db.ref('callRequests/'+auth.currentUser.uid+'/'+incomingCallData.callId).remove();
        incomingCallData = null;
    }
}

function endCall() {
    if (callId) db.ref('calls/'+callId+'/status').set('ended');
    endCallCleanup();
}

function endCallCleanup() {
    document.getElementById('callScreen').classList.remove('on');
    document.getElementById('remoteVideo').classList.remove('on');
    document.getElementById('localVideo').classList.remove('on');
    clearInterval(callTimerInterval); callTimerInterval = null;
    document.getElementById('callTimer').classList.remove('on');
    document.getElementById('callTimer').textContent = '0:00';
    if (localStream) { localStream.getTracks().forEach(t=>t.stop()); localStream = null; }
    if (peerConnection) { peerConnection.close(); peerConnection = null; }
    if (callId) {
        db.ref('calls/'+callId+'/callerCandidates').off();
        db.ref('calls/'+callId+'/calleeCandidates').off();
        db.ref('calls/'+callId+'/answer').off();
        db.ref('calls/'+callId+'/status').off();
        if (isCaller) db.ref('callRequests/'+currentChatPartner+'/'+callId).remove();
    }
    callId = null; remoteStream = null; isMuted = false; isCameraOn = false;
    document.getElementById('callMuteBtn').classList.remove('active');
    document.getElementById('callCamBtn').classList.remove('active');
}

function showCallScreen(name, photo, status) {
    document.getElementById('callName').textContent = name;
    document.getElementById('callStatus').textContent = status;
    document.getElementById('callAvatar').src = photo || 'https://placehold.co/112/1c2b3a/fff?text=?';
    document.getElementById('callBgAvatar').src = photo || '';
    document.getElementById('callAvatarRing').classList.add('calling');
    document.getElementById('callTimer').classList.remove('on');
    document.getElementById('callScreen').classList.add('on');
}

function startCallTimer() {
    callStartTime = Date.now();
    document.getElementById('callTimer').classList.add('on');
    callTimerInterval = setInterval(() => {
        const secs = Math.floor((Date.now()-callStartTime)/1000);
        const m = Math.floor(secs/60), s = secs%60;
        document.getElementById('callTimer').textContent = `${m}:${String(s).padStart(2,'0')}`;
    }, 1000);
}

function toggleMute() {
    if (!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    document.getElementById('callMuteBtn').classList.toggle('active', isMuted);
    showToast(isMuted ? 'Muted' : 'Unmuted');
}

function toggleSpeaker() {
    isSpeaker = !isSpeaker;
    document.getElementById('callSpeakerBtn').classList.toggle('active', isSpeaker);
    showToast(isSpeaker ? 'Speaker on' : 'Speaker off');
}

function toggleCamera() {
    if (!localStream) return;
    isCameraOn = !isCameraOn;
    localStream.getVideoTracks().forEach(t => t.enabled = isCameraOn);
    document.getElementById('callCamBtn').classList.toggle('active', isCameraOn);
    showToast(isCameraOn ? 'Camera on' : 'Camera off');
}

// ═══════════════════════════════════════
// iOS KEYBOARD FIX
// ═══════════════════════════════════════
(function() {
    const app = document.getElementById('messengerApp');
    const inp = document.getElementById('pmInput');
    if (!app || !inp) return;
    let t, kb = false;
    function applyKb() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        const vt = window.visualViewport ? window.visualViewport.offsetTop||0 : 0;
        window.scrollTo(0,0); app.style.top=vt+'px'; app.style.height=vh+'px';
        const msgs = document.getElementById('pmMessages');
        if (msgs) msgs.scrollTop = msgs.scrollHeight;
    }
    function resetKb() { app.style.top=''; app.style.height=''; kb=false; }
    inp.addEventListener('focus', ()=>{ kb=true; clearTimeout(t); t=setTimeout(applyKb,350); });
    inp.addEventListener('blur', ()=>{ kb=false; clearTimeout(t); t=setTimeout(resetKb,100); });
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', ()=>{ clearTimeout(t); t=setTimeout(kb?applyKb:resetKb,100); });
    }
})();
</script>
