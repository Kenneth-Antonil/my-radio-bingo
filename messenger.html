<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, interactive-widget=resizes-visual">
    <meta name="theme-color" content="#07091a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Messages | Radio Bingo Live</title>

    <link rel="icon" type="image/png" href="https://i.imgur.com/7D8u8h6.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/7D8u8h6.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

    <style>
        :root {
            --accent: #0ea5e9;
            --bg: #07091a;
            --text: #ffffff;
            --spacing-sm: 12px;
            --spacing-md: 16px;
            --spacing-lg: 20px;
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }

        html, body {
            margin: 0; padding: 0;
            height: 100%; height: 100dvh;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            overflow: hidden;
        }

        /* ── FULL PAGE CONTAINER ── */
        #messengerApp {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            overflow: hidden;
        }

        /* ── VIEWS ── */
        .pm-view {
            display: none;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }
        .pm-view.active { display: flex; }

        /* ── HEADERS ── */
        .pm-inboxhdr {
            flex-shrink: 0;
            padding: max(env(safe-area-inset-top), 14px) 14px 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--bg);
            border-bottom: 1px solid rgba(255,255,255,.06);
            min-height: 60px;
        }
        .pm-inboxhdr-title {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.5px;
            flex: 1;
        }
        .pm-hdrbtn {
            background: rgba(255,255,255,.08);
            border: none;
            color: #fff;
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            transition: background 0.15s;
        }
        .pm-hdrbtn:active { background: rgba(255,255,255,.16); }
        .pm-chatname {
            font-size: 16px; font-weight: 800; color: #fff;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .pm-chatstatus { font-size: 11px; color: rgba(255,255,255,.4); }
        .pm-chatstatus.online { color: #22c55e; }
        .pm-call-btn {
            background: rgba(34,197,94,.15);
            border: 1px solid rgba(34,197,94,.3);
            color: #22c55e;
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            transition: background .15s, transform .1s;
        }
        .pm-call-btn:active { background: rgba(34,197,94,.28); transform: scale(.9); }

        /* ── SEARCH ── */
        .pm-searchwrap { padding: 8px 14px 6px; background: var(--bg); }
        .pm-searchwrap-inner { position: relative; }
        .pm-searchwrap-inner::before {
            content: '🔍';
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%);
            font-size: 13px; pointer-events: none;
        }
        .pm-searchinput {
            width: 100%;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.09);
            border-radius: 24px;
            padding: 10px 16px 10px 38px;
            color: #fff; font-size: 14px; outline: none;
            font-family: inherit; box-sizing: border-box;
        }
        .pm-searchinput::placeholder { color: rgba(255,255,255,.35); }

        /* ── ACTIVE FRIENDS BAR ── */
        .pm-activebar {
            display: flex; gap: 0;
            padding: 10px 10px 8px;
            overflow-x: auto; scrollbar-width: none;
            border-bottom: 1px solid rgba(255,255,255,.05);
            background: var(--bg);
        }
        .pm-activebar::-webkit-scrollbar { display: none; }
        .pm-activelabel {
            font-size: 11px; color: rgba(255,255,255,.4);
            font-weight: 700; align-self: center;
            white-space: nowrap; flex-shrink: 0;
            padding: 0 6px; text-transform: uppercase; letter-spacing: 0.5px;
        }
        .pm-afitem {
            display: flex; flex-direction: column;
            align-items: center; gap: 5px;
            cursor: pointer; flex-shrink: 0; padding: 0 7px;
            transition: transform 0.15s;
        }
        .pm-afitem:active { transform: scale(0.93); }
        .pm-afring {
            width: 54px; height: 54px; border-radius: 50%;
            border: 2.5px solid #22c55e; padding: 2px;
            position: relative; background: #0d1226;
        }
        .pm-afring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
        .pm-afdot {
            position: absolute; bottom: 1px; right: 1px;
            width: 13px; height: 13px;
            background: #22c55e; border: 2.5px solid var(--bg);
            border-radius: 50%;
        }
        .pm-afname {
            font-size: 10px; color: rgba(255,255,255,.55);
            font-weight: 700; max-width: 56px;
            text-align: center; overflow: hidden;
            text-overflow: ellipsis; white-space: nowrap;
        }

        /* ── INBOX LIST ── */
        .pm-inbox-list {
            flex: 1; overflow-y: auto;
            background: var(--bg); -webkit-overflow-scrolling: touch;
        }
        .pm-inbox-list::-webkit-scrollbar { display: none; }
        .pm-item {
            display: flex; align-items: center; gap: 12px;
            padding: 10px 14px; cursor: pointer;
            transition: background 0.15s;
            border-bottom: 1px solid rgba(255,255,255,.04);
            position: relative;
        }
        .pm-item:active { background: rgba(255,255,255,.05); }
        .pm-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1.5px solid rgba(255,255,255,.08); }
        .pm-info { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
        .pm-name { font-size: 15px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pm-preview { font-size: 13px; color: rgba(255,255,255,.4); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .pm-item-time { font-size: 11px; color: rgba(255,255,255,.3); white-space: nowrap; flex-shrink: 0; align-self: flex-start; padding-top: 4px; }

        /* ── EMPTY / SKELETON ── */
        .pm-empty-state {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 60px 20px;
            gap: 12px; color: rgba(255,255,255,.35);
            font-size: 14px; font-weight: 500;
        }
        .pm-empty-icon { font-size: 48px; margin-bottom: 4px; }
        .pm-skeleton { display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,.04); }
        .pm-skel-avatar {
            width: 56px; height: 56px; border-radius: 50%; flex-shrink: 0;
            background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.05) 75%);
            background-size: 200% 100%;
            animation: pmShimmer 1.4s ease-in-out infinite;
        }
        .pm-skel-info { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .pm-skel-line {
            height: 12px; border-radius: 6px;
            background: linear-gradient(90deg, rgba(255,255,255,.05) 25%, rgba(255,255,255,.1) 50%, rgba(255,255,255,.05) 75%);
            background-size: 200% 100%;
            animation: pmShimmer 1.4s ease-in-out infinite;
        }
        .pm-skel-line:nth-child(1) { width: 55%; }
        .pm-skel-line:nth-child(2) { width: 75%; }
        @keyframes pmShimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* ── AVATAR WITH ONLINE DOT ── */
        .avatar-frame { position: relative; display: inline-block; flex-shrink: 0; }
        .avatar-frame img { display: block; border-radius: 50%; border: 2px solid rgba(255,255,255,0.1); object-fit: cover; }
        .online-indicator {
            position: absolute; bottom: 2px; right: 2px;
            width: 14px; height: 14px;
            background-color: #22c55e; border: 2px solid #0f172a;
            border-radius: 50%; z-index: 20;
            display: none; box-shadow: 0 0 5px rgba(34,197,94,0.5);
        }
        .online-indicator.is-online { display: block; }

        /* ── VERIFIED BADGE ── */
        .verified-badge {
            display: inline-flex; align-items: center; justify-content: center;
            width: 16px; height: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border-radius: 50%; margin-left: 4px;
            box-shadow: 0 2px 8px rgba(59,130,246,0.4);
            cursor: pointer;
        }
        .verified-badge i { width: 10px; height: 10px; color: white; }

        /* ── MESSAGE AREA ── */
        .pm-msgarea {
            flex: 1; min-height: 0;
            overflow-y: auto; padding: 12px 10px;
            display: flex; flex-direction: column; gap: 2px;
            background: var(--bg);
            -webkit-overflow-scrolling: touch; overscroll-behavior: contain;
        }
        .pm-msgarea::-webkit-scrollbar { width: 3px; }
        .pm-msgarea::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

        /* Bubbles */
        .msg-bubble {
            padding: var(--spacing-sm) 16px;
            font-size: 14.5px; max-width: 75%;
            word-break: break-word; line-height: 1.4;
            margin-bottom: 2px; position: relative;
            border-radius: 20px;
        }
        .msg-me { align-self: flex-end; background: linear-gradient(135deg, var(--accent), #3b82f6); color: white; border-bottom-right-radius: 5px; }
        .msg-them { align-self: flex-start; background: #1c2540; color: #e2e8f0; border-bottom-left-radius: 5px; }
        .msg-sticker { background: transparent !important; font-size: 48px; line-height: 1; padding: 4px 8px; }
        .msg-image-preview { max-width: 200px; border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.1); margin-top: 5px; cursor: pointer; }
        .msg-heart-reaction {
            position: absolute; bottom: -8px; right: -5px;
            background: #1c2540; border: 1px solid #334155;
            border-radius: 10px; padding: 2px 5px; font-size: 11px;
            display: flex; align-items: center; gap: 2px;
            box-shadow: 0 2px 6px rgba(0,0,0,.4);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        .pm-day-divider {
            text-align: center; font-size: 11px;
            color: rgba(255,255,255,.3); font-weight: 600;
            margin: 10px 0 6px; position: relative;
        }
        .pm-day-divider::before, .pm-day-divider::after {
            content: ''; position: absolute; top: 50%;
            width: 28%; height: 1px; background: rgba(255,255,255,.07);
        }
        .pm-day-divider::before { left: 0; }
        .pm-day-divider::after { right: 0; }

        /* Typing indicator */
        .pm-typing2 { display: none; align-self: flex-start; background: #1c2540; border-radius: 20px; border-bottom-left-radius: 5px; padding: 12px 18px; gap: 5px; align-items: center; margin-bottom: 4px; }
        .pm-typing2.on { display: flex; }
        .tdot2 { width: 7px; height: 7px; background: rgba(255,255,255,.45); border-radius: 50%; animation: tbounce2 1.2s ease-in-out infinite; }
        .tdot2:nth-child(2) { animation-delay: .2s; }
        .tdot2:nth-child(3) { animation-delay: .4s; }
        @keyframes tbounce2 { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

        /* ── IMAGE STRIP ── */
        .pm-imgstrip2 { display: none; padding: 8px 10px 0; background: var(--bg); }
        .pm-imgstrip2.on { display: flex; align-items: center; gap: 8px; }
        .pm-imgstrip2 img { width: 60px; height: 60px; border-radius: 12px; object-fit: cover; border: 1.5px solid rgba(255,255,255,.12); }

        /* ── EMOJI / STICKER PANELS ── */
        .pm-panel2 {
            display: none; flex-wrap: wrap; gap: 6px;
            padding: 10px 10px 6px; background: #0d1226;
            border-top: 1px solid rgba(255,255,255,.06);
            max-height: 160px; overflow-y: auto;
        }
        .pm-panel2.open { display: flex; }
        .pm-emj { font-size: 28px; cursor: pointer; line-height: 1; padding: 4px; border-radius: 8px; transition: background 0.15s; }
        .pm-emj:active { background: rgba(255,255,255,.1); }
        .pm-stk { font-size: 38px; cursor: pointer; line-height: 1; padding: 6px; border-radius: 10px; transition: transform 0.15s; }
        .pm-stk:active { transform: scale(1.2); }

        /* ── FOOTER ── */
        .pm-footer2 {
            flex-shrink: 0;
            padding: 8px 10px;
            padding-bottom: max(env(safe-area-inset-bottom), 10px);
            background: var(--bg);
            border-top: 1px solid rgba(255,255,255,.07);
        }
        .pm-inputrow { display: flex; align-items: center; gap: 6px; width: 100%; }
        .pm-newinput {
            flex: 1; min-width: 0;
            background: #1c2540; border: 1.5px solid rgba(255,255,255,.1);
            border-radius: 24px; padding: 11px 18px;
            color: #fff; font-size: 14px; outline: none;
            font-family: inherit; min-height: 44px; max-height: 120px;
            transition: border-color 0.2s;
        }
        .pm-newinput:focus { border-color: rgba(14,165,233,.5); }
        .pm-newinput::placeholder { color: rgba(255,255,255,.3); }
        .pm-iconbtn2 {
            background: #1c2540; border: none;
            color: rgba(255,255,255,.6);
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0; font-size: 19px;
            transition: background 0.15s, transform 0.1s;
        }
        .pm-iconbtn2:active { background: rgba(255,255,255,.15); transform: scale(0.9); }
        .pm-sendbtn2 {
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            color: #fff; border: none;
            width: 42px; height: 42px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; flex-shrink: 0;
            box-shadow: 0 4px 14px rgba(14,165,233,.4);
            transition: transform 0.1s, box-shadow 0.15s;
        }
        .pm-sendbtn2:active { transform: scale(0.9); box-shadow: none; }
        .pm-voiceon {
            background: linear-gradient(135deg, #ef4444, #dc2626) !important;
            color: #fff !important;
            animation: vpulse2 1s ease-in-out infinite;
        }
        @keyframes vpulse2 { 0%, 100% { box-shadow: 0 0 0 0 rgba(239,68,68,.5); } 50% { box-shadow: 0 0 0 8px rgba(239,68,68,0); } }
        @media (max-width: 360px) {
            .pm-iconbtn2 { width: 34px; height: 34px; }
            .pm-newinput { padding: 10px 12px; font-size: 13px; }
            .pm-sendbtn2 { width: 38px; height: 38px; }
            .pm-inputrow { gap: 4px; }
        }

        /* ── GROUP CREATE ── */
        .styled-input {
            width: 100%; background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 12px; padding: 12px 16px;
            color: #fff; font-size: 15px; outline: none;
            font-family: inherit; box-sizing: border-box;
        }
        .friend-select-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 12px; border-radius: 12px;
            margin-bottom: 6px; cursor: pointer;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.07);
            transition: background 0.15s;
        }
        .friend-select-item.selected { background: rgba(14,165,233,.15); border-color: rgba(14,165,233,.4); }
        .checkbox-circle {
            width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid rgba(255,255,255,.2);
            display: flex; align-items: center; justify-content: center;
        }
        .friend-select-item.selected .checkbox-circle { background: var(--accent); border-color: var(--accent); }

        /* ── TOAST ── */
        #customToast {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: rgba(30,41,59,0.97); color: white;
            padding: 10px 20px; border-radius: 24px;
            font-size: 14px; font-weight: 600;
            opacity: 0; transition: opacity 0.3s, transform 0.3s;
            pointer-events: none; z-index: 99999;
            white-space: nowrap; max-width: 90vw;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
        }
        #customToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ── FULLSCREEN PHOTO ── */
        #photoViewer {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.98); z-index: 99998;
            align-items: center; justify-content: center;
        }
        #photoViewer.show { display: flex; }
        #photoViewer img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 8px; }
        #photoViewerClose {
            position: absolute; top: max(env(safe-area-inset-top), 16px); right: 16px;
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.2);
            color: white; width: 40px; height: 40px; border-radius: 8px;
            font-size: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center;
        }

        /* ── AUTH GATE ── */
        #authGate {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            height: 100%; gap: 16px; padding: 32px;
            text-align: center;
        }
        .auth-gate-icon { font-size: 56px; }
        .auth-gate-title { font-size: 20px; font-weight: 900; color: white; }
        .auth-gate-sub { font-size: 14px; color: rgba(255,255,255,.5); }
        .auth-gate-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, var(--accent), #3b82f6);
            border: none; border-radius: 14px; color: white;
            font-size: 15px; font-weight: 700; cursor: pointer;
            margin-top: 8px;
        }

        /* ── NEW FEATURES CSS ── */
        .msg-time { font-size: 10px; color: rgba(255,255,255,.35); margin-top: 3px; display: block; }
        .msg-me .msg-time { text-align: right; }
        .msg-them .msg-time { text-align: left; }

        .msg-seen { font-size: 10px; color: rgba(255,255,255,.4); text-align: right; margin-top: 1px; padding-right: 4px; }

        .msg-reactions { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
        .reaction-chip {
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
            border-radius: 12px; padding: 2px 7px; font-size: 13px; cursor: pointer;
            display: inline-flex; align-items: center; gap: 3px;
            animation: popIn 0.2s ease; transition: background 0.15s;
        }
        .reaction-chip:active { background: rgba(255,255,255,.2); }
        .reaction-chip .rc-count { font-size: 11px; color: rgba(255,255,255,.7); }

        .msg-reply-quote {
            border-left: 3px solid rgba(255,255,255,.4); padding: 4px 8px;
            margin-bottom: 6px; border-radius: 0 6px 6px 0;
            background: rgba(0,0,0,.2); cursor: pointer;
        }
        .msg-reply-name { font-size: 10px; font-weight: 700; color: rgba(255,255,255,.7); }
        .msg-reply-text { font-size: 12px; color: rgba(255,255,255,.5); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        #replyPreviewStrip {
            display: none; align-items: center; gap: 8px;
            padding: 6px 10px; background: rgba(14,165,233,.12);
            border-top: 1px solid rgba(14,165,233,.3);
            border-left: 3px solid var(--accent);
        }
        #replyPreviewStrip.on { display: flex; }
        #replyPreviewName { font-size: 11px; font-weight: 700; color: var(--accent); }
        #replyPreviewText { font-size: 12px; color: rgba(255,255,255,.5); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #replyCancelBtn { background: none; border: none; color: rgba(255,255,255,.5); font-size: 18px; cursor: pointer; flex-shrink: 0; }

        #ctxOverlay { display: none; position: fixed; inset: 0; z-index: 9998; }
        #ctxOverlay.on { display: block; }
        #msgContextMenu {
            display: none; position: fixed; z-index: 9999;
            background: rgba(22,33,62,.98); border: 1px solid rgba(255,255,255,.12);
            border-radius: 14px; padding: 6px; min-width: 170px;
            box-shadow: 0 8px 32px rgba(0,0,0,.6); backdrop-filter: blur(20px);
            animation: menuFadeIn 0.15s ease;
        }
        #msgContextMenu.on { display: block; }
        @keyframes menuFadeIn { from { opacity:0; transform: scale(0.92); } to { opacity:1; transform: scale(1); } }
        .ctx-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border-radius: 10px; cursor: pointer;
            color: white; font-size: 14px; font-weight: 500; background: none; border: none; width: 100%;
            transition: background 0.1s;
        }
        .ctx-item:active { background: rgba(255,255,255,.1); }
        .ctx-item.danger { color: #ef4444; }

        #reactionPicker {
            display: none; position: fixed; z-index: 10000;
            background: rgba(22,33,62,.98); border: 1px solid rgba(255,255,255,.12);
            border-radius: 40px; padding: 8px 12px; gap: 6px;
            box-shadow: 0 4px 24px rgba(0,0,0,.5); backdrop-filter: blur(20px);
            animation: menuFadeIn 0.15s ease;
        }
        #reactionPicker.on { display: flex; }

<script>
    // ─────────────────────────────────────────
    // FIREBASE INIT
    // ─────────────────────────────────────────
    const firebaseConfig = {
        apiKey: "AIzaSyDIAQXJ15atKJxu7PtcFL1W9JnO1N14pVs",
        authDomain: "radiobingo-9ac29.firebaseapp.com",
        databaseURL: "https://radiobingo-9ac29-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "radiobingo-9ac29",
        storageBucket: "radiobingo-9ac29.firebasestorage.app",
        messagingSenderId: "965903993397",
        appId: "1:965903993397:web:f6646fa05225f147eebf7c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const auth = firebase.auth();

    // ─────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────
    let userData = {};
    let currentChatPartner = null;
    let isGroupChat = false;
    let pmListenerRef = null;
    let isInitialLoad = true;
    let pmImageBase64 = null;
    let _pmEmojiOpen = false;
    let _pmStkOpen = false;
    let _pmVoiceRec = null;
    let _pmVoiceChunks = [];
    let _pmTypeTimer = null;

    // ─────────────────────────────────────────
    // AUTH CHECK
    // ─────────────────────────────────────────
    auth.onAuthStateChanged(user => {
        if (user) {
            db.ref('users/' + user.uid).once('value', snap => {
                userData = snap.val() || {};
                userData.uid = user.uid;
                showView('pmInboxView');
                loadInbox();
                loadPmActiveFriends();
                lucide.createIcons();
            });
        } else {
            hideAllViews();
            document.getElementById('authGate').style.display = 'flex';
        }
    });

    // ─────────────────────────────────────────
    // NAVIGATION HELPERS
    // ─────────────────────────────────────────
    function showView(id) {
        document.getElementById('authGate').style.display = 'none';
        ['pmInboxView', 'pmChatView', 'pmCreateGroupView'].forEach(v => {
            const el = document.getElementById(v);
            el.classList.remove('active');
            el.style.display = '';
        });
        const target = document.getElementById(id);
        target.classList.add('active');
        target.style.display = 'flex';
        setTimeout(() => lucide.createIcons(), 50);
    }

    function hideAllViews() {
        ['pmInboxView', 'pmChatView', 'pmCreateGroupView'].forEach(v => {
            document.getElementById(v).classList.remove('active');
        });
    }

    function goHome() {
        window.location.href = 'index.html';
    }

    // ─────────────────────────────────────────
    // UTILITIES
    // ─────────────────────────────────────────
    function showToast(msg) {
        const toast = document.getElementById('customToast');
        document.getElementById('toastMsg').innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function escapeHtml(text) {
        if (!text) return '';
        return String(text)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
    }

    function fixDate(timestamp) {
        if (!timestamp) return 'Just now';
        const d = new Date(parseInt(timestamp));
        return d.toLocaleDateString('en-PH', { month: 'short', day: 'numeric' }) + ' ' +
               d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
    }

    function formatLastSeen(timestamp) {
        if (!timestamp) return '';
        const now = Date.now();
        const diff = now - timestamp;
        const mins = Math.floor(diff / 60000);
        const hrs = Math.floor(diff / 3600000);
        const days = Math.floor(diff / 86400000);
        if (mins < 1) return 'just now';
        if (mins < 60) return mins + 'm ago';
        if (hrs < 24) return hrs + 'h ago';
        return days + 'd ago';
    }

    function compressImage(file, maxWidth, quality) {
        return new Promise(resolve => {
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ratio = Math.min(1, maxWidth / img.width);
                    canvas.width = img.width * ratio;
                    canvas.height = img.height * ratio;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        });
    }

    function openFullscreenPhoto(url) {
        document.getElementById('photoViewerImg').src = url;
        document.getElementById('photoViewer').classList.add('show');
    }

    function closePhotoViewer() {
        document.getElementById('photoViewer').classList.remove('show');
    }

    // ─────────────────────────────────────────
    // INBOX
    // ─────────────────────────────────────────
    function loadInbox() {
        const uid = auth.currentUser.uid;
        const list = document.getElementById('pmList');
        list.innerHTML = `
            <div class="pm-skeleton"><div class="pm-skel-avatar"></div><div class="pm-skel-info"><div class="pm-skel-line"></div><div class="pm-skel-line"></div></div></div>
            <div class="pm-skeleton"><div class="pm-skel-avatar"></div><div class="pm-skel-info"><div class="pm-skel-line"></div><div class="pm-skel-line"></div></div></div>
            <div class="pm-skeleton"><div class="pm-skel-avatar"></div><div class="pm-skel-info"><div class="pm-skel-line"></div><div class="pm-skel-line"></div></div></div>
        `;

        const loadTimeout = setTimeout(() => {
            if (list.querySelector('.pm-skeleton')) {
                list.innerHTML = `<div class="pm-empty-state"><div class="pm-empty-icon">💬</div><div style="font-weight:700;color:rgba(255,255,255,.6);font-size:16px;">No conversations yet</div><div>Start chatting with a friend!</div></div>`;
            }
        }, 8000);

        renderActiveFriends();

        db.ref('groupMembers/' + uid).once('value', gSnap => {
            const myGroups = gSnap.exists() ? Object.keys(gSnap.val()) : [];

            const msgRef  = db.ref('messages').orderByChild('from').equalTo(uid).limitToLast(150);
            const msgRef2 = db.ref('messages').orderByChild('to').equalTo(uid).limitToLast(150);

            const conversations = {};
            let queriesDone = 0;

            function processMsgSnap(s) {
                s.forEach(msgSnap => {
                    const m = msgSnap.val();
                    const partner = m.from === uid ? m.to : m.from;
                    if (!partner) return;
                    if (!conversations[partner] || m.timestamp > (conversations[partner].timestamp || 0)) {
                        conversations[partner] = m;
                    }
                });
                queriesDone++;
                if (queriesDone === 2) afterMsgsLoaded();
            }

            msgRef.once('value', processMsgSnap, () => { queriesDone++; if (queriesDone === 2) afterMsgsLoaded(); });
            msgRef2.once('value', processMsgSnap, () => { queriesDone++; if (queriesDone === 2) afterMsgsLoaded(); });

            function afterMsgsLoaded() {
                clearTimeout(loadTimeout);
                list.innerHTML = '';

                myGroups.forEach(groupId => {
                    db.ref('groups/' + groupId).once('value', groupSnap => {
                        const grp = groupSnap.val();
                        if (!grp) return;
                        const div = document.createElement('div');
                        div.className = 'pm-item';
                        div.onclick = () => openGroupChat(groupId, grp.name);
                        div.innerHTML = `
                            <div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#1e293b,#0f172a);display:flex;align-items:center;justify-content:center;color:#60a5fa;border:1.5px solid rgba(255,255,255,0.1);flex-shrink:0;">
                                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                            </div>
                            <div class="pm-info"><span class="pm-name">${escapeHtml(grp.name)}</span><span class="pm-preview">Group Chat</span></div>
                        `;
                        list.appendChild(div);
                    });
                });

                if (Object.keys(conversations).length === 0 && myGroups.length === 0) {
                    list.innerHTML = `<div class="pm-empty-state"><div class="pm-empty-icon">💬</div><div style="font-weight:700;color:rgba(255,255,255,.6);font-size:16px;">No conversations yet</div><div>Start chatting with a friend!</div></div>`;
                    return;
                }

                const conversationDataList = [];
                const partnerIds = Object.keys(conversations);
                let processed = 0;
                if (partnerIds.length === 0) return;

                partnerIds.forEach(partnerId => {
                    db.ref('users/' + partnerId).once('value', uSnap => {
                        const u = uSnap.val() || { name: 'Unknown', photo: '' };
                        const lastMsg = conversations[partnerId];

                        db.ref('status/' + partnerId).once('value', statusSnap => {
                            const status = statusSnap.val();
                            const isOnline = status && status.state === 'online';
                            const lastSeenText = !isOnline && status && status.last_seen ? formatLastSeen(status.last_seen) : '';

                            conversationDataList.push({ partnerId, userData: u, lastMsg, isOnline, lastSeenText, timestamp: lastMsg.timestamp || 0 });
                            processed++;

                            if (processed === partnerIds.length) {
                                conversationDataList.sort((a, b) => {
                                    if (a.isOnline && !b.isOnline) return -1;
                                    if (!a.isOnline && b.isOnline) return 1;
                                    return b.timestamp - a.timestamp;
                                });

                                conversationDataList.forEach(data => {
                                    const div = document.createElement('div');
                                    div.className = 'pm-item';
                                    div.onclick = () => openPrivateChat(data.partnerId, data.userData.name, data.userData.photo);
                                    const previewText = data.lastMsg.image ? 'Sent a photo' : data.lastMsg.text;
                                    const isVerified = data.userData.verified === true;
                                    const verifiedBadgeHTML = isVerified ? `<span class="verified-badge"><i data-lucide="check" style="width:10px;height:10px;color:white;"></i></span>` : '';
                                    const onlineDot = data.isOnline ? '<div class="online-indicator is-online"></div>' : '';
                                    const statusInfo = data.isOnline
                                        ? '<span style="color:#22c55e;font-size:12px;font-weight:500;">Active now</span>'
                                        : (data.lastSeenText ? `<span style="color:rgba(255,255,255,0.4);font-size:11px;">Active ${data.lastSeenText}</span>` : '');

                                    div.innerHTML = `
                                        <div class="avatar-frame" data-uid="${data.partnerId}" style="position:relative;flex-shrink:0;">
                                            <img class="pm-avatar" src="${data.userData.photo || 'https://via.placeholder.com/40'}">
                                            ${onlineDot}
                                        </div>
                                        <div class="pm-info">
                                            <div style="display:flex;align-items:center;gap:6px;">
                                                <span class="pm-name">${data.userData.name}${verifiedBadgeHTML}</span>
                                            </div>
                                            <span class="pm-preview">${data.lastMsg.from === uid ? 'You: ' : ''}${escapeHtml(previewText || '')}</span>
                                            ${statusInfo ? `<span>${statusInfo}</span>` : ''}
                                        </div>
                                        <div class="pm-item-time">${fixDate(data.timestamp)}</div>
                                    `;
                                    list.appendChild(div);
                                    lucide.createIcons({ el: div });
                                });
                            }
                        });
                    });
                });
            }
        });
    }

    function renderActiveFriends() {
        const bar = document.getElementById('pmActiveFriendsBar');
        bar.innerHTML = '<span class="pm-activelabel">Active</span>';
        if (!auth.currentUser) return;
        db.ref('friends/' + auth.currentUser.uid).once('value', s => {
            if (!s.exists()) return;
            const friendsList = [];
            s.forEach(f => friendsList.push(f.key));
            friendsList.forEach(friendId => {
                db.ref('status/' + friendId).on('value', statusSnap => {
                    const status = statusSnap.val();
                    if (status && status.state === 'online') {
                        db.ref('users/' + friendId).once('value', uSnap => {
                            const u = uSnap.val(); if (!u) return;
                            const existing = bar.querySelector(`[data-friend-id="${friendId}"]`);
                            if (existing) existing.remove();
                            const item = document.createElement('div');
                            item.className = 'pm-afitem';
                            item.dataset.friendId = friendId;
                            item.onclick = () => openPrivateChat(friendId, u.name, u.photo || '');
                            item.innerHTML = `<div class="pm-afring"><img src="${u.photo || 'https://via.placeholder.com/44'}" alt=""><div class="pm-afdot"></div></div><div class="pm-afname">${escapeHtml((u.name || '').split(' ')[0])}</div>`;
                            bar.appendChild(item);
                        });
                    } else {
                        const existing = bar.querySelector(`[data-friend-id="${friendId}"]`);
                        if (existing) existing.remove();
                    }
                });
            });
        });
    }

    function filterPmList(q) {
        document.querySelectorAll('.pm-item').forEach(el => {
            const name = el.querySelector('.pm-name');
            if (!name) return;
            el.style.display = name.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
        });
    }

    function loadPmActiveFriends() {
        if (!auth || !auth.currentUser) return;
        const bar = document.getElementById('pmActiveFriendsBar');
        if (!bar) return;
        const myUid = auth.currentUser.uid;
        bar.innerHTML = '<span class="pm-activelabel">Active</span>';
        db.ref('friends/' + myUid).once('value', snap => {
            if (!snap.exists()) return;
            Object.keys(snap.val()).forEach(uid => {
                db.ref('status/' + uid).once('value', ss => {
                    const st = ss.val();
                    if (!st || st.state !== 'online') return;
                    db.ref('users/' + uid).once('value', us => {
                        const u = us.val(); if (!u) return;
                        const item = document.createElement('div');
                        item.className = 'pm-afitem';
                        item.onclick = () => openPrivateChat(uid, u.name, u.photo || '');
                        item.innerHTML = `<div class="pm-afring"><img src="${u.photo || 'https://via.placeholder.com/44'}" alt=""><div class="pm-afdot"></div></div><div class="pm-afname">${escapeHtml((u.name || '').split(' ')[0])}</div>`;
                        bar.appendChild(item);
                    });
                });
            });
        });
    }

    // ─────────────────────────────────────────
    // OPEN PRIVATE CHAT
    // ─────────────────────────────────────────
    function openPrivateChat(uid, name, photo) {
        if (uid === auth.currentUser.uid) return showToast("Can't message yourself");
        currentChatPartner = uid;
        isGroupChat = false;
        document.getElementById('chatTargetName').innerText = name;

        const statusRef = db.ref('status/' + uid);
        statusRef.on('value', statusSnap => {
            const status = statusSnap.val();
            const el = document.getElementById('chatTargetStatus');
            if (status && status.state === 'online') {
                el.innerText = 'Active now'; el.style.color = '#22c55e';
            } else if (status && status.last_seen) {
                el.innerText = `Active ${formatLastSeen(status.last_seen)}`; el.style.color = 'rgba(255,255,255,0.5)';
            } else {
                el.innerText = 'Offline'; el.style.color = 'rgba(255,255,255,0.4)';
            }
        });

        document.getElementById('chatTargetAvatarCont').innerHTML = `<img src="${photo}" style="width:100%;height:100%;border-radius:50%;object-fit:cover;">`;

        db.ref('notifications/' + auth.currentUser.uid).once('value', s => {
            s.forEach(n => {
                if (n.val().type === 'pm' && n.val().from === uid)
                    db.ref('notifications/' + auth.currentUser.uid + '/' + n.key).remove();
            });
        });

        listenPrivateMessages(auth.currentUser.uid);
        showView('pmChatView');

        // Typing indicator listener
        db.ref('typing/' + auth.currentUser.uid + '/' + uid).on('value', snap => {
            const el = document.getElementById('pmTypingIndicator');
            if (el) el.classList.toggle('on', snap.exists() && snap.val() === true);
        });
    }

    // ─────────────────────────────────────────
    // GROUP CHAT
    // ─────────────────────────────────────────
    function openGroupChat(groupId, groupName) {
        currentChatPartner = groupId;
        isGroupChat = true;
        document.getElementById('chatTargetName').innerText = groupName;
        document.getElementById('chatTargetStatus').innerText = 'Group Chat';
        document.getElementById('chatTargetAvatarCont').innerHTML = `<div style="width:100%;height:100%;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;"><i data-lucide="users" style="width:18px;height:18px;"></i></div>`;
        listenGroupMessages(groupId);
        showView('pmChatView');
        lucide.createIcons();
    }

    function listenGroupMessages(groupId) {
        const chatDiv = document.getElementById('pmMessages');
        chatDiv.innerHTML = '';
        if (pmListenerRef) pmListenerRef.off();
        const gRef = db.ref('groupMessages/' + groupId).limitToLast(100);
        gRef.on('child_added', s => {
            const m = s.val();
            const div = document.createElement('div');
            div.className = `msg-bubble ${m.from === auth.currentUser.uid ? 'msg-me' : 'msg-them'}`;
            let contentHtml = '';
            if (m.isSticker) { div.classList.add('msg-sticker'); contentHtml = `<span style="font-size:48px;line-height:1;">${m.text || ''}</span>`; }
            else if (m.isVoice && m.audio) { contentHtml = `<audio controls src="${m.audio}" style="max-width:200px;height:36px;border-radius:20px;outline:none;"></audio>`; }
            else {
                contentHtml = m.text ? escapeHtml(m.text) : '';
                if (m.image) contentHtml += `<br><img src="${m.image}" class="msg-image-preview" onclick="openFullscreenPhoto('${m.image}')">`;
            }
            if (m.from !== auth.currentUser.uid) {
                contentHtml = `<span style="font-size:9px;color:#94a3b8;display:block;margin-bottom:2px;">${escapeHtml(m.senderName || 'User')}</span>` + contentHtml;
            }
            div.innerHTML = contentHtml;
            chatDiv.appendChild(div);
            chatDiv.scrollTop = chatDiv.scrollHeight;
        });
        pmListenerRef = gRef;
    }

    // ─────────────────────────────────────────
    // LISTEN PRIVATE MESSAGES
    // ─────────────────────────────────────────
    function listenPrivateMessages(myUid) {
        const chatDiv = document.getElementById('pmMessages');
        chatDiv.innerHTML = '';
        if (pmListenerRef) { pmListenerRef.off(); pmListenerRef = null; }
        isInitialLoad = true;

        pmListenerRef = db.ref('messages').limitToLast(100);
        pmListenerRef.on('child_added', s => {
            const m = s.val();
            const key = s.key;

            if (!isInitialLoad && m.to === myUid && (m.timestamp > (Date.now() - 2000))) {
                db.ref('users/' + m.from).once('value', uSnap => {
                    const sender = uSnap.val();
                    if (sender) {
                        const msgText = m.isSticker ? '(Sticker)' : m.isVoice ? '(Voice note)' : m.image ? '(Photo)' : (m.text || '');
                        const preview = msgText.length > 30 ? msgText.substring(0, 30) + '...' : msgText;
                        if (currentChatPartner !== m.from) showToast(`${escapeHtml(sender.name)}: ${escapeHtml(preview)}`);
                    }
                });
            }

            if (!currentChatPartner) return;
            if ((m.from === myUid && m.to === currentChatPartner) || (m.from === currentChatPartner && m.to === myUid)) {
                const div = document.createElement('div');
                div.className = `msg-bubble ${m.from === myUid ? 'msg-me' : 'msg-them'}`;
                let contentHtml = '';
                if (m.isSticker) { div.classList.add('msg-sticker'); contentHtml = `<span style="font-size:48px;line-height:1;">${m.text || ''}</span>`; }
                else if (m.isVoice && m.audio) { contentHtml = `<audio controls src="${m.audio}" style="max-width:200px;height:36px;border-radius:20px;outline:none;"></audio>`; }
                else {
                    contentHtml = m.text ? escapeHtml(m.text) : '';
                    if (m.image) contentHtml += `<br><img src="${m.image}" class="msg-image-preview" onclick="openFullscreenPhoto('${m.image}')">`;
                }
                let heartHtml = m.hearted ? `<div class="msg-heart-reaction"><svg width="12" height="12" viewBox="0 0 24 24" fill="#ef4444" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>` : '';
                div.innerHTML = contentHtml + heartHtml;
                div.ondblclick = () => {
                    if (!m.hearted) { db.ref('messages/' + key).update({ hearted: true }); showToast('❤️ Message hearted'); }
                };
                chatDiv.appendChild(div);
                chatDiv.scrollTop = chatDiv.scrollHeight;
            }
        });
        setTimeout(() => { isInitialLoad = false; }, 1500);
    }

    // ─────────────────────────────────────────
    // SEND MESSAGE
    // ─────────────────────────────────────────
    function sendPrivateMessage() {
        const inp = document.getElementById('pmInput');
        const text = inp.value.trim();
        const imageData = pmImageBase64 || null;
        if ((!text && !imageData) || !currentChatPartner) return;
        const myUid = auth.currentUser.uid;

        if (isGroupChat) {
            const msgData = { from: myUid, senderName: userData.name, text: text, image: imageData, timestamp: Date.now() };
            db.ref('groupMessages/' + currentChatPartner).push(msgData);
        } else {
            const msgData = { from: myUid, to: currentChatPartner, text: text, image: imageData, timestamp: Date.now() };
            db.ref('messages').push(msgData);
            const notifMsg = imageData ? 'Sent a photo' : `New PM from ${userData.name}`;
            db.ref('notifications/' + currentChatPartner).push({ msg: notifMsg, time: Date.now(), type: 'pm', from: myUid, fromName: userData.name });
        }

        inp.value = '';
        pmImageBase64 = null;
        document.getElementById('pmImgInput').value = '';
        const strip = document.getElementById('pmImgStrip2');
        if (strip) strip.classList.remove('on');
    }

    // ─────────────────────────────────────────
    // BACK TO INBOX
    // ─────────────────────────────────────────
    function backToInbox() {
        if (currentChatPartner) db.ref('status/' + currentChatPartner).off();
        currentChatPartner = null;
        isGroupChat = false;
        if (pmListenerRef) pmListenerRef.off();
        showView('pmInboxView');
        loadInbox();
        loadPmActiveFriends();
    }

    // ─────────────────────────────────────────
    // DELETE CONVERSATION
    // ─────────────────────────────────────────
    function deleteConversation() {
        if (!currentChatPartner) return;
        const confirmMsg = isGroupChat ? 'Delete this group chat?' : 'Delete this conversation? All messages will be removed.';
        if (!confirm(confirmMsg)) return;
        const myUid = auth.currentUser.uid;
        if (isGroupChat) {
            db.ref('groups/' + currentChatPartner + '/members/' + myUid).remove();
            db.ref('groupMembers/' + myUid + '/' + currentChatPartner).remove();
            showToast('Left group chat');
        } else {
            db.ref('messages').once('value', s => {
                const updates = {};
                s.forEach(msgSnap => {
                    const m = msgSnap.val();
                    if ((m.from === myUid && m.to === currentChatPartner) || (m.from === currentChatPartner && m.to === myUid))
                        updates['messages/' + msgSnap.key] = null;
                });
                db.ref().update(updates);
                showToast('Conversation deleted');
            });
        }
        backToInbox();
    }

    // ─────────────────────────────────────────
    // VOICE CALL (redirects to main app)
    // ─────────────────────────────────────────
    function startCallFromChat() {
        showToast('📞 Open the main app for voice calls');
    }

    // ─────────────────────────────────────────
    // EMOJI / STICKER / IMAGE
    // ─────────────────────────────────────────
    function togglePmPanel2(type) {
        if (type === 'emoji') { _pmEmojiOpen = !_pmEmojiOpen; _pmStkOpen = false; }
        else { _pmStkOpen = !_pmStkOpen; _pmEmojiOpen = false; }
        document.getElementById('pmEmojiPanel2').classList.toggle('open', _pmEmojiOpen);
        document.getElementById('pmStickerPanel2').classList.toggle('open', _pmStkOpen);
    }

    function insertEmoji2(e) {
        const inp = document.getElementById('pmInput');
        if (inp) { inp.value += e; inp.focus(); }
    }

    function sendSticker2(emoji) {
        if (!currentChatPartner || !auth || !auth.currentUser) return showToast('Open a chat first!');
        const myUid = auth.currentUser.uid;
        const msg = { from: myUid, text: emoji, isSticker: true, timestamp: Date.now() };
        if (isGroupChat) { msg.senderName = userData.name || 'User'; db.ref('groupMessages/' + currentChatPartner).push(msg); }
        else { msg.to = currentChatPartner; db.ref('messages').push(msg); }
        document.getElementById('pmStickerPanel2').classList.remove('open');
        _pmStkOpen = false;
    }

    function handlePmImage(input) {
        if (input.files && input.files[0]) {
            compressImage(input.files[0], 500, 0.7).then(base64 => {
                pmImageBase64 = base64;
                const strip = document.getElementById('pmImgStrip2');
                const thumb = document.getElementById('pmImgThumb2');
                if (thumb) thumb.src = base64;
                if (strip) strip.classList.add('on');
            });
        }
    }

    function clearPmImage() {
        pmImageBase64 = null;
        document.getElementById('pmImgInput').value = '';
        document.getElementById('pmImgStrip2').classList.remove('on');
    }

    // ─────────────────────────────────────────
    // TYPING INDICATOR
    // ─────────────────────────────────────────
    function onPmType() {
        if (!currentChatPartner || isGroupChat || !auth || !auth.currentUser) return;
        db.ref('typing/' + currentChatPartner + '/' + auth.currentUser.uid).set(true);
        clearTimeout(_pmTypeTimer);
        _pmTypeTimer = setTimeout(() => {
            db.ref('typing/' + currentChatPartner + '/' + auth.currentUser.uid).remove();
        }, 2000);
    }

    // ─────────────────────────────────────────
    // VOICE RECORDING
    // ─────────────────────────────────────────
    function startVoice2() {
        if (!navigator.mediaDevices || !window.MediaRecorder) return showToast('Voice recording not supported.');
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
            _pmVoiceChunks = [];
            _pmVoiceRec = new MediaRecorder(stream);
            _pmVoiceRec.ondataavailable = e => { _pmVoiceChunks.push(e.data); };
            _pmVoiceRec.onstop = () => {
                const blob = new Blob(_pmVoiceChunks, { type: 'audio/webm' });
                const reader = new FileReader();
                reader.onload = ev => {
                    if (!currentChatPartner || !auth || !auth.currentUser) return;
                    const myUid = auth.currentUser.uid;
                    const msg = { from: myUid, audio: ev.target.result, isVoice: true, timestamp: Date.now() };
                    if (isGroupChat) { msg.senderName = userData.name || 'User'; db.ref('groupMessages/' + currentChatPartner).push(msg); }
                    else { msg.to = currentChatPartner; db.ref('messages').push(msg); }
                    showToast('🎙️ Voice note sent!');
                };
                reader.readAsDataURL(blob);
                stream.getTracks().forEach(t => t.stop());
            };
            _pmVoiceRec.start();
            document.getElementById('pmVoiceBtn2').classList.add('pm-voiceon');
            showToast('🎙️ Recording… release to send');
        }).catch(() => showToast('Microphone access denied.'));
    }

    function stopVoice2() {
        if (_pmVoiceRec && _pmVoiceRec.state === 'recording') {
            _pmVoiceRec.stop();
            document.getElementById('pmVoiceBtn2').classList.remove('pm-voiceon');
        }
    }

    // ─────────────────────────────────────────
    // GROUP CREATE
    // ─────────────────────────────────────────
    function startCreateGroup() {
        showView('pmCreateGroupView');
        const container = document.getElementById('friendSelectContainer');
        container.innerHTML = 'Loading friends...';
        db.ref('friends/' + auth.currentUser.uid).once('value', s => {
            container.innerHTML = '';
            if (!s.exists()) { container.innerHTML = '<div style="color:rgba(255,255,255,.4);font-size:14px;">No friends found.</div>'; return; }
            s.forEach(f => {
                db.ref('users/' + f.key).once('value', uSnap => {
                    const u = uSnap.val(); if (!u) return;
                    const div = document.createElement('div');
                    div.className = 'friend-select-item';
                    div.onclick = () => div.classList.toggle('selected');
                    div.dataset.uid = f.key;
                    div.innerHTML = `<div style="display:flex;align-items:center;gap:12px;"><img src="${u.photo || 'https://via.placeholder.com/40'}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;"><span style="color:white;font-size:15px;font-weight:600;">${escapeHtml(u.name)}</span></div><div class="checkbox-circle"><i data-lucide="check" style="width:12px;"></i></div>`;
                    container.appendChild(div);
                    lucide.createIcons({ el: div });
                });
            });
        });
    }

    function cancelCreateGroup() { showView('pmInboxView'); }

    function finalizeCreateGroup() {
        const name = document.getElementById('newGroupName').value.trim();
        if (!name) return showToast('Enter Group Name');
        const selected = document.querySelectorAll('.friend-select-item.selected');
        if (selected.length === 0) return showToast('Select at least 1 friend');
        const members = { [auth.currentUser.uid]: true };
        selected.forEach(el => members[el.dataset.uid] = true);
        const groupRef = db.ref('groups').push();
        groupRef.set({ name, createdBy: auth.currentUser.uid, members }).then(() => {
            Object.keys(members).forEach(uid => db.ref('groupMembers/' + uid + '/' + groupRef.key).set(true));
            showToast('Group Created!');
            showView('pmInboxView');
            loadInbox();
        });
    }

    // ─────────────────────────────────────────
    // iOS KEYBOARD FIX
    // ─────────────────────────────────────────
    (function() {
        var app = document.getElementById('messengerApp');
        var pmInput = document.getElementById('pmInput');
        if (!app || !pmInput) return;
        var _kbTimer = null;
        var _isKeyboardOpen = false;

        function applyKbHeight() {
            var vh, vt;
            if (window.visualViewport) { vh = window.visualViewport.height; vt = window.visualViewport.offsetTop || 0; }
            else { vh = window.innerHeight; vt = 0; }
            window.scrollTo(0, 0);
            app.style.top = vt + 'px';
            app.style.height = vh + 'px';
            var msgs = document.getElementById('pmMessages');
            if (msgs) msgs.scrollTop = msgs.scrollHeight;
        }

        function resetKbHeight() {
            app.style.top = '';
            app.style.height = '';
            _isKeyboardOpen = false;
        }

        pmInput.addEventListener('focus', () => { _isKeyboardOpen = true; clearTimeout(_kbTimer); _kbTimer = setTimeout(applyKbHeight, 350); });
        pmInput.addEventListener('blur', () => { _isKeyboardOpen = false; clearTimeout(_kbTimer); _kbTimer = setTimeout(resetKbHeight, 100); });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                clearTimeout(_kbTimer);
                _kbTimer = setTimeout(_isKeyboardOpen ? applyKbHeight : resetKbHeight, 100);
            });
        }
    })();

    // Init lucide icons
    document.addEventListener('DOMContentLoaded', () => lucide.createIcons());
</script>

// ── Override listenPrivateMessages with enhanced version ──
const _origListenPM = listenPrivateMessages;
listenPrivateMessages = function(myUid) {
    const chatDiv = document.getElementById('pmMessages');
    chatDiv.innerHTML = '';
    if (typeof pmListenerRef !== 'undefined' && pmListenerRef) { pmListenerRef.off(); }
    isInitialLoad = true;

    // Mark messages as read
    if (currentChatPartner) {
        db.ref('unread/' + myUid + '/' + currentChatPartner).remove();
        db.ref('seen/' + currentChatPartner + '/' + myUid).set({ time: Date.now(), by: myUid });
        // Listen for when partner reads our messages
        db.ref('seen/' + myUid + '/' + currentChatPartner).on('value', seenSnap => {
            updateSeenBadge(seenSnap.exists());
        });
    }

    pmListenerRef = db.ref('messages').limitToLast(100);

    pmListenerRef.on('child_added', s => {
        const m = s.val();
        const key = s.key;

        // Toast for incoming messages (same as original)
        if (!isInitialLoad && m.to === myUid && (m.timestamp > (Date.now() - 2000))) {
            db.ref('users/' + m.from).once('value', uSnap => {
                const sender = uSnap.val();
                if (sender) {
                    const msgText = m.isSticker ? '(Sticker)' : m.isVoice ? '(Voice note)' : m.image ? '(Photo)' : (m.text || '');
                    const preview = msgText.length > 30 ? msgText.substring(0, 30) + '...' : msgText;
                    if (currentChatPartner !== m.from) showToast(escapeHtml(sender.name) + ': ' + escapeHtml(preview));
                }
            });
        }

        if (!currentChatPartner) return;
        if (!((m.from === myUid && m.to === currentChatPartner) || (m.from === currentChatPartner && m.to === myUid))) return;

        renderBubble(key, m, myUid);
        chatDiv.scrollTop = chatDiv.scrollHeight;
    });

    // Listen for reaction updates
    pmListenerRef.on('child_changed', s => {
        const m = s.val(); const key = s.key;
        if (!currentChatPartner) return;
        if (!((m.from === myUid && m.to === currentChatPartner) || (m.from === currentChatPartner && m.to === myUid))) return;
        const existing = document.querySelector('[data-msgkey="' + key + '"]');
        if (existing) {
            // Update heart (original feature)
            const heartEl = existing.querySelector('.msg-heart-reaction');
            if (m.hearted && !heartEl) {
                const hDiv = document.createElement('div');
                hDiv.className = 'msg-heart-reaction';
                hDiv.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="#ef4444" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
                existing.appendChild(hDiv);
            }
            // Update reactions
            updateReactionDisplay(existing, m.reactions);
        }
    });

    // Listen for deletions
    pmListenerRef.on('child_removed', s => {
        const el = document.querySelector('[data-msgkey="' + s.key + '"]');
        if (el) el.remove();
    });

    setTimeout(() => { isInitialLoad = false; }, 1500);
};

function renderBubble(key, m, myUid) {
    const chatDiv = document.getElementById('pmMessages');
    const isOwn = m.from === myUid;
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'display:flex;flex-direction:column;' + (isOwn ? 'align-items:flex-end;' : 'align-items:flex-start;');
    wrapper.setAttribute('data-wrapper', key);

    const div = document.createElement('div');
    div.className = 'msg-bubble ' + (isOwn ? 'msg-me' : 'msg-them');
    div.setAttribute('data-msgkey', key);
    if (m.isSticker) div.classList.add('msg-sticker');

    // Reply quote
    if (m.replyTo) {
        const rq = document.createElement('div');
        rq.className = 'msg-reply-quote';
        rq.onclick = () => scrollToMsg(m.replyTo.key);
        rq.innerHTML = '<div class="msg-reply-name">' + escapeHtml(m.replyTo.senderName || 'User') + '</div>' +
            '<div class="msg-reply-text">' + escapeHtml(m.replyTo.text || (m.replyTo.image ? '📷 Photo' : '...')) + '</div>';
        div.appendChild(rq);
    }

    // Content
    const contentSpan = document.createElement('span');
    if (m.isSticker) {
        contentSpan.innerHTML = '<span style="font-size:48px;line-height:1;">' + (m.text || '') + '</span>';
    } else if (m.isVoice && m.audio) {
        contentSpan.innerHTML = '<audio controls src="' + m.audio + '" style="max-width:200px;height:36px;border-radius:20px;outline:none;"></audio>';
    } else {
        contentSpan.innerHTML = m.text ? escapeHtml(m.text) : '';
        if (m.image) contentSpan.innerHTML += '<br><img src="' + m.image + '" class="msg-image-preview" onclick="openFullscreenPhoto(\'' + m.image.replace(/'/g, "\\'") + '\')">';
    }
    div.appendChild(contentSpan);

    // Legacy heart
    if (m.hearted) {
        const hDiv = document.createElement('div');
        hDiv.className = 'msg-heart-reaction';
        hDiv.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="#ef4444" stroke="none"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
        div.appendChild(hDiv);
    }

    // Double-click = heart (same as original)
    div.ondblclick = () => {
        if (!m.hearted) { db.ref('messages/' + key).update({ hearted: true }); showToast('❤️ Message hearted'); }
    };

    // Long press = context menu
    let _lpTimer = null;
    const startLP = (e) => { _lpTimer = setTimeout(() => openCtx(e, key, m, isOwn), 500); };
    const cancelLP = () => clearTimeout(_lpTimer);
    div.addEventListener('touchstart', startLP, { passive: true });
    div.addEventListener('touchend', cancelLP);
    div.addEventListener('touchmove', cancelLP);
    div.addEventListener('mousedown', startLP);
    div.addEventListener('mouseup', cancelLP);

    wrapper.appendChild(div);

    // Timestamp
    if (m.timestamp) {
        const timeEl = document.createElement('span');
        timeEl.className = 'msg-time';
        const d = new Date(m.timestamp);
        timeEl.textContent = d.toLocaleTimeString('en-PH', { hour: '2-digit', minute: '2-digit' });
        wrapper.appendChild(timeEl);
    }

    // Reactions display
    const reactDiv = document.createElement('div');
    reactDiv.className = 'msg-reactions';
    reactDiv.setAttribute('data-react-for', key);
    if (m.reactions) updateReactionDisplay(div, m.reactions);
    wrapper.appendChild(reactDiv);

    // Seen indicator (only on last own message)
    if (isOwn) {
        const seenEl = document.createElement('div');
        seenEl.className = 'msg-seen';
        seenEl.setAttribute('data-seen-key', key);
        seenEl.textContent = '✓ Sent';
        wrapper.appendChild(seenEl);
        _lastSentKey = key;
    }

    chatDiv.appendChild(wrapper);
}

function updateReactionDisplay(bubbleEl, reactions) {
    if (!bubbleEl) return;
    const wrapper = bubbleEl.closest('[data-wrapper]');
    if (!wrapper) return;
    const reactDiv = wrapper.querySelector('.msg-reactions');
    if (!reactDiv) return;
    if (!reactions) { reactDiv.innerHTML = ''; return; }
    const counts = {};
    Object.values(reactions).forEach(e => { counts[e] = (counts[e] || 0) + 1; });
    const key = bubbleEl.getAttribute('data-msgkey');
    reactDiv.innerHTML = Object.entries(counts).map(([emoji, count]) =>
        '<span class="reaction-chip" onclick="sendReactionForKey(\'' + key + '\',\'' + emoji + '\')">' + emoji + (count > 1 ? '<span class="rc-count">' + count + '</span>' : '') + '</span>'
    ).join('');
}

function updateSeenBadge(isSeen) {
    // Remove all old seen badges
    document.querySelectorAll('.msg-seen').forEach(el => el.remove());
    if (!_lastSentKey) return;
    const wrapper = document.querySelector('[data-wrapper="' + _lastSentKey + '"]');
    if (!wrapper) return;
    const seenEl = document.createElement('div');
    seenEl.className = 'msg-seen';
    seenEl.setAttribute('data-seen-key', _lastSentKey);
    seenEl.textContent = isSeen ? '✓✓ Seen' : '✓ Sent';
    seenEl.style.color = isSeen ? '#60a5fa' : 'rgba(255,255,255,.4)';
    wrapper.appendChild(seenEl);
}

// ── Override sendPrivateMessage to support reply ──
const _origSendPM = sendPrivateMessage;
sendPrivateMessage = function() {
    const inp = document.getElementById('pmInput');
    const text = inp.value.trim();
    const imageData = pmImageBase64 || null;
    if ((!text && !imageData) || !currentChatPartner) return;
    const myUid = auth.currentUser.uid;

    if (isGroupChat) {
        const msgData = { from: myUid, senderName: userData.name, text, image: imageData, timestamp: Date.now() };
        if (replyToMsg) msgData.replyTo = replyToMsg;
        db.ref('groupMessages/' + currentChatPartner).push(msgData);
    } else {
        const msgData = { from: myUid, to: currentChatPartner, text, image: imageData, timestamp: Date.now() };
        if (replyToMsg) msgData.replyTo = replyToMsg;
        db.ref('messages').push(msgData).then(ref => {
            _lastSentKey = ref.key;
            // Increment unread for partner
            db.ref('unread/' + currentChatPartner + '/' + myUid).transaction(v => (v || 0) + 1);
        });
        const notifMsg = imageData ? 'Sent a photo' : 'New PM from ' + userData.name;
        db.ref('notifications/' + currentChatPartner).push({ msg: notifMsg, time: Date.now(), type: 'pm', from: myUid, fromName: userData.name });
    }

    inp.value = '';
    pmImageBase64 = null;
    document.getElementById('pmImgInput').value = '';
    const strip = document.getElementById('pmImgStrip2');
    if (strip) strip.classList.remove('on');
    cancelReply();
};

// ── Override loadInbox to show unread badges ──
const _origLoadInbox = loadInbox;
loadInbox = function() {
    _origLoadInbox();
    // After inbox loads, check unread counts and add badges
    setTimeout(() => addUnreadBadges(), 1500);
};

function addUnreadBadges() {
    if (!auth.currentUser) return;
    const myUid = auth.currentUser.uid;
    document.querySelectorAll('.pm-item').forEach(item => {
        const avatarEl = item.querySelector('[data-uid]');
        if (!avatarEl) return;
        const partnerId = avatarEl.getAttribute('data-uid');
        if (!partnerId) return;
        db.ref('unread/' + myUid + '/' + partnerId).once('value', snap => {
            const count = snap.val() || 0;
            if (count > 0) {
                let badge = item.querySelector('.unread-badge');
                if (!badge) {
                    badge = document.createElement('span');
                    badge.className = 'unread-badge';
                    const timeEl = item.querySelector('.pm-item-time');
                    if (timeEl) timeEl.parentNode.insertBefore(badge, timeEl.nextSibling);
                    else item.appendChild(badge);
                }
                badge.textContent = count > 99 ? '99+' : count;
                item.querySelector('.pm-name') && (item.querySelector('.pm-name').style.fontWeight = '900');
            }
        });
    });
}

// ── Context Menu ──
function openCtx(e, key, msgData, isOwn) {
    _ctxKey = key; _ctxData = msgData; _ctxIsOwn = isOwn;
    document.getElementById('ctxDeleteBtn').style.display = isOwn ? '' : 'none';
    const menu = document.getElementById('msgContextMenu');
    const overlay = document.getElementById('ctxOverlay');
    let x = 20, y = 100;
    if (e.touches && e.touches.length) { x = e.touches[0].clientX - 10; y = e.touches[0].clientY - 10; }
    else if (e.clientX) { x = e.clientX - 10; y = e.clientY - 10; }
    menu.style.left = Math.min(x, window.innerWidth - 190) + 'px';
    menu.style.top = Math.min(y, window.innerHeight - 180) + 'px';
    menu.classList.add('on');
    overlay.classList.add('on');
}

function closeCtx() {
    document.getElementById('msgContextMenu').classList.remove('on');
    document.getElementById('reactionPicker').classList.remove('on');
    document.getElementById('ctxOverlay').classList.remove('on');
}

function ctxAction(action) {
    closeCtx();
    if (action === 'reply') {
        if (!_ctxData) return;
        replyToMsg = { key: _ctxKey, senderName: _ctxIsOwn ? (userData.name || 'You') : document.getElementById('chatTargetName').innerText, text: _ctxData.text, image: _ctxData.image };
        document.getElementById('replyPreviewName').textContent = replyToMsg.senderName;
        document.getElementById('replyPreviewText').textContent = replyToMsg.text || (_ctxData.image ? '📷 Photo' : '...');
        document.getElementById('replyPreviewStrip').classList.add('on');
        document.getElementById('pmInput').focus();
    } else if (action === 'copy') {
        const text = _ctxData && _ctxData.text;
        if (text) { navigator.clipboard && navigator.clipboard.writeText(text).then(() => showToast('📋 Copied!')); }
    } else if (action === 'delete') {
        if (!_ctxIsOwn || !_ctxKey) return;
        if (confirm('Delete this message?')) { db.ref('messages/' + _ctxKey).remove(); showToast('Message deleted'); }
    }
}

function cancelReply() {
    replyToMsg = null;
    const strip = document.getElementById('replyPreviewStrip');
    if (strip) strip.classList.remove('on');
}

// ── Reactions ──
function sendReaction(emoji) {
    closeCtx();
    if (!_ctxKey || !auth.currentUser) return;
    const path = isGroupChat
        ? 'groupMessages/' + currentChatPartner + '/' + _ctxKey + '/reactions/' + auth.currentUser.uid
        : 'messages/' + _ctxKey + '/reactions/' + auth.currentUser.uid;
    db.ref(path).set(emoji);
    showToast(emoji + ' Reaction sent');
}

function sendReactionForKey(key, emoji) {
    if (!auth.currentUser) return;
    const path = isGroupChat
        ? 'groupMessages/' + currentChatPartner + '/' + key + '/reactions/' + auth.currentUser.uid
        : 'messages/' + key + '/reactions/' + auth.currentUser.uid;
    db.ref(path).set(emoji);
}

// ── Scroll to replied message ──
function scrollToMsg(key) {
    const el = document.querySelector('[data-msgkey="' + key + '"]');
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.classList.add('msg-search-highlight'); setTimeout(() => el.classList.remove('msg-search-highlight'), 1500); }
}

// ── Search ──
function runSearch(q) {
    document.querySelectorAll('.msg-search-highlight').forEach(el => el.classList.remove('msg-search-highlight'));
    _searchMatches = []; _searchIdx = -1;
    const countEl = document.getElementById('chatSearchCount');
    if (!q.trim()) { countEl.textContent = ''; return; }
    document.querySelectorAll('.msg-bubble').forEach(el => {
        if (el.textContent.toLowerCase().includes(q.toLowerCase())) _searchMatches.push(el);
    });
    countEl.textContent = _searchMatches.length ? '1/' + _searchMatches.length : 'No results';
    if (_searchMatches.length) { _searchIdx = 0; highlightSearch(); }
}

function navSearch(dir) {
    if (!_searchMatches.length) return;
    _searchIdx = (_searchIdx + dir + _searchMatches.length) % _searchMatches.length;
    document.getElementById('chatSearchCount').textContent = (_searchIdx + 1) + '/' + _searchMatches.length;
    highlightSearch();
}

function highlightSearch() {
    document.querySelectorAll('.msg-search-highlight').forEach(el => el.classList.remove('msg-search-highlight'));
    if (_searchMatches[_searchIdx]) {
        _searchMatches[_searchIdx].classList.add('msg-search-highlight');
        _searchMatches[_searchIdx].scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function closeSearch() {
    const sb = document.getElementById('chatSearchBar');
    if (sb) sb.classList.remove('on');
    document.querySelectorAll('.msg-search-highlight').forEach(el => el.classList.remove('msg-search-highlight'));
}
</script>
</body>
