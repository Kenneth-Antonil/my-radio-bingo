<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0c12">
    <title>RB Live | Closed</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/4nljOtR.png">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: #0a0c12;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .closure-card {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .closure-card img {
            width: 80px;
            height: 80px;
            border-radius: 18px;
            margin-bottom: 28px;
            box-shadow: 0 0 30px rgba(220, 38, 38, 0.3);
        }
        .closure-banner {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #fff;
            padding: 28px 24px;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.3px;
            line-height: 1.6;
            box-shadow: 0 8px 32px rgba(220, 38, 38, 0.35);
        }
        .closure-banner .date {
            font-size: 28px;
            display: block;
            margin: 12px 0;
            letter-spacing: 1px;
        }
        .closure-banner .thankyou {
            margin-top: 16px;
            font-size: 15px;
            font-weight: 600;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="closure-card">
        <img src="https://i.imgur.com/4nljOtR.png" alt="RB Live">
        <div class="closure-banner">
            THIS SITE WILL BE DELETED ON
            <span class="date">APRIL 5, 2026</span>
            ALL YOUR CASHOUT WILL BE RECEIVED IN 1-2 WEEKS.
            <div class="thankyou">THANK YOU FOR BEING A PART OF RB LIVE ❤️</div>
        </div>
    </div>
</body>
</html>
